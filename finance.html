<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SILO</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  

  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.10);
      --border: #e5e7eb;
      --border-2: #dbe2ea;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.06);
      --radius: 18px;
      --radius-sm: 12px;
    }

    [data-theme="dark"] {
      --bg: #0b1120;
      --surface: #111827;
      --surface-2: #0f172a;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --accent-soft: rgba(96, 165, 250, 0.14);
      --border: #1f2937;
      --border-2: #2a3647;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: Inter, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.06), transparent 22%),
        var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    button, input { font: inherit; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.72);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    [data-theme="dark"] header {
      background: rgba(17,24,39,0.72);
    }

    .header-left {
      min-width: 0;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-badge {
      width: 34px;
      height: 34px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), #1d4ed8);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      flex: 0 0 auto;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.24);
    }

    .brand {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .crumb {
      margin-top: 3px;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      min-height: 38px;
      padding: 0 13px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: .16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--border-2);
      background: var(--surface-2);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #1d4ed8);
      color: #fff;
      border-color: transparent;
    }

    .btn.icon {
      width: 38px;
      padding: 0;
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.68);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    [data-theme="dark"] .tabs {
      background: rgba(17,24,39,0.68);
    }

    .tab {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .02em;
      white-space: nowrap;
      cursor: pointer;
      transition: .16s ease;
    }

    .tab:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .tab.active {
      background: linear-gradient(135deg, var(--accent), #1d4ed8);
      color: #fff;
      border-color: transparent;
    }

    .container {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
      min-height: 0;
      flex: 1;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: rgba(255,255,255,0.72);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    [data-theme="dark"] .sidebar {
      background: rgba(17,24,39,0.72);
    }

    .sidebar-top {
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    .search-wrap {
      position: relative;
      margin-bottom: 10px;
    }

    .search-wrap span {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 13px;
      pointer-events: none;
    }

    .search {
      width: 100%;
      min-height: 38px;
      padding: 0 12px 0 32px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .sidebar-note {
      font-size: 12px;
      color: var(--muted);
    }

    .sidebar-sections {
      padding: 12px;
      overflow-y: auto;
      display: grid;
      gap: 10px;
    }

    details.section {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      overflow: hidden;
    }

    details.section[open] {
      box-shadow: var(--shadow);
    }

    .section-summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 13px;
      cursor: pointer;
      user-select: none;
      background: linear-gradient(180deg, var(--surface-2), transparent);
    }

    .section-summary::-webkit-details-marker { display: none; }

    .section-left {
      min-width: 0;
    }

    .section-label {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .section-title {
      margin-top: 3px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .section-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .count {
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
    }

    .chev {
      font-size: 12px;
      color: var(--muted);
      transition: transform .16s ease;
    }

    details[open] .chev {
      transform: rotate(90deg);
    }

    .section-list {
      display: grid;
      gap: 6px;
      padding: 0 8px 8px;
    }

    .nav-btn {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      border-radius: 12px;
      padding: 11px;
      text-align: left;
      cursor: pointer;
      transition: .16s ease;
    }

    .nav-btn:hover {
      background: var(--surface-2);
      border-color: var(--border);
    }

    .nav-btn.active {
      background: linear-gradient(135deg, var(--accent-soft), transparent);
      border-color: rgba(37, 99, 235, 0.20);
    }

    .nav-label {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
    }

    .empty {
      padding: 14px;
      border: 1px dashed var(--border-2);
      border-radius: 14px;
      color: var(--muted);
      background: var(--surface);
      font-size: 13px;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      padding: 14px;
      gap: 12px;
    }

    .viewer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    [data-theme="dark"] .viewer-head {
      background: rgba(17,24,39,0.72);
    }

    .viewer-copy {
      min-width: 0;
    }

    .viewer-kicker {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .viewer-title {
      margin-top: 4px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .viewer-sub {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .frame-wrap {
      flex: 1;
      min-height: 0;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    [data-theme="dark"] .frame-wrap {
      background: rgba(17,24,39,0.72);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 14px;
      background: var(--surface);
    }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .container {
        grid-template-columns: 1fr;
      }
      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 42vh;
      }
      header,
      .viewer-head {
        flex-direction: column;
        align-items: stretch;
      }
      .actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body data-theme="light">
  <header>
    <div class="header-left">
      <div class="brand-row">
        <div class="brand-badge">FH</div>
        <div class="brand">Finance Department</div>
      </div>
      <div class="crumb" id="crumb">Finance Department</div>
    </div>

    <div class="actions">
      <button class="btn icon" id="themeToggle" type="button" aria-label="Toggle theme">🌓</button>
      <button class="btn" id="reloadBtn" type="button">Reload</button>
      <button class="btn primary" id="openNewTab" type="button">↗ Open</button>
    </div>
  </header>

  <div class="tabs" id="tabs"></div>

  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="search-wrap">
          <span>⌕</span>
          <input id="menuSearch" class="search" type="text" placeholder="Search pages..." autocomplete="off" />
        </div>
        <div class="sidebar-note" id="sidebarNote">Showing all tools</div>
      </div>

      <div class="sidebar-sections" id="sidebar"></div>
    </aside>

    <main class="main">
      <div class="viewer-head">
        <div class="viewer-copy">
          <div class="viewer-kicker">Current Page</div>
          <div class="viewer-title" id="viewerTitle">FinanceHub</div>
          <div class="viewer-sub" id="viewerSub">Select a page from the menu.</div>
        </div>

        <div class="actions">
          <button class="btn" id="reloadBtnSecondary" type="button">Reload</button>
          <button class="btn primary" id="openNewTabSecondary" type="button">Open in New Tab</button>
        </div>
      </div>

      <div class="frame-wrap">
        <iframe id="viewer" title="Tool Viewer"></iframe>
      </div>
    </main>
  </div>

  <script>
    const ROUTES = [
      { id:"baseballism", label:"Baseballism", group:"core", src:"/employeehub.html" },
      { id:"AP - Manager", label:"AP - Manager", group:"core", src:"/accountspayable.html" },
      { id:"MailRoom Inbox", label:"MailRoom Inbox", group:"core", src:"/mailroom.html" },
      { id:"travel-requests", label:"Travel Requests", group:"core", src:"https://www.jotform.com/grid/200496754119055" },
      { id:"bars-requests", label:"Bars Requests", group:"core", src:"https://www.jotform.com/grid/222686658265065" },
      { id:"Executive", label:"Executive", group:"core", src:"/executive.html" },
      { id:"payables", label:"BBISM Payables", group:"wip", src:"/ap-report.html" },
      { id:"Receivables", label:"BBISM Receivables", group:"wip", src:"/pages/baseballismwholesale.html" },
      { id:"WPV Receivables", label:"WPV Receivables", group:"wip", src:"/wpvaccounts.html" },
      { id:"travel", label:"Travel Report", group:"wip", src:"/travel.html" },
      { id:"sales-dashboard", label:"BI Sales Dashboard", group:"wip", src:"https://app.powerbi.com/view?r=eyJrIjoiY2U0MWI2ZmMtMTY3MS00MDY3LTg5NjctN2VlYjk0NGMxNzUzIiwidCI6IjIzYTkzNDJkLTFjODEtNGJkNS1hY2U0LThmYWY4ZWVlNTZiZCJ9" },
      { id:"Projections", label:"Revenue Projection", group:"planning", src:"/projections.html" },
      { id:"launch-calendar", label:"Marketing Calendar", group:"planning", src:"/calendar.html" },
      { id:"po-calendar", label:"PO Calendar", group:"planning", src:"/planner.html" },
      { id:"po-create", label:"PO Builder", group:"planning", src:"/pages/po-builder.html" },
      { id:"factories", label:"Factories", group:"planning", src:"/pages/factories.html" },
      { id:"Tags", label:"Product Tags", group:"planning", src:"/pages/product-manager.html" },
      { id:"Inventory", label:"Inventory", group:"wip", src:"/inventory.html" } 
    ];

    const GROUPS = {
      all: "All",
      core: "Core",
      wip: "Reports",
      planning: "Planning"
    };

    let currentTab = "all";
    let currentRoute = null;
    let searchTerm = "";

    const $ = id => document.getElementById(id);
    const els = {
      tabs: $("tabs"),
      sidebar: $("sidebar"),
      viewer: $("viewer"),
      crumb: $("crumb"),
      viewerTitle: $("viewerTitle"),
      viewerSub: $("viewerSub"),
      search: $("menuSearch"),
      note: $("sidebarNote"),
      theme: $("themeToggle"),
      openA: $("openNewTab"),
      openB: $("openNewTabSecondary")
    };

    const titleCase = s => s.charAt(0).toUpperCase() + s.slice(1);
    const byId = id => ROUTES.find(r => r.id === id);
    const countOf = group => group === "all" ? ROUTES.length : ROUTES.filter(r => r.group === group).length;

    function visibleRoutes() {
      const q = searchTerm.trim().toLowerCase();
      return ROUTES.filter(r =>
        (currentTab === "all" || r.group === currentTab) &&
        (!q ||
          r.label.toLowerCase().includes(q) ||
          r.id.toLowerCase().includes(q) ||
          r.group.toLowerCase().includes(q))
      );
    }

    function grouped(routes) {
      return routes.reduce((acc, route) => {
        (acc[route.group] ||= []).push(route);
        return acc;
      }, {});
    }

    function buildTabs() {
      els.tabs.innerHTML = "";
      ["all", "core", "wip", "planning"].forEach(group => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `tab${currentTab === group ? " active" : ""}`;
        btn.textContent = `${GROUPS[group]} · ${countOf(group)}`;
        btn.onclick = () => {
          currentTab = group;
          render();
        };
        els.tabs.appendChild(btn);
      });
    }

    function createSection(group, routes, open = false) {
      const section = document.createElement("details");
      section.className = "section";
      if (open) section.open = true;

      const summary = document.createElement("summary");
      summary.className = "section-summary";
      summary.innerHTML = `
        <div class="section-left">
          <div class="section-label">${titleCase(group)}</div>
          <div class="section-title">${GROUPS[group] || titleCase(group)}</div>
        </div>
        <div class="section-meta">
          <div class="count">${routes.length}</div>
          <div class="chev">›</div>
        </div>
      `;

      const list = document.createElement("div");
      list.className = "section-list";

      routes.forEach(route => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `nav-btn${currentRoute === route.id ? " active" : ""}`;
        btn.onclick = () => navigate(route.id);
        btn.innerHTML = `<div class="nav-label">${route.label}</div>`;
        list.appendChild(btn);
      });

      section.appendChild(summary);
      section.appendChild(list);
      return section;
    }

    function buildSidebar() {
      const routes = visibleRoutes();
      const groups = grouped(routes);
      const order = currentTab === "all" ? ["core", "wip", "planning"] : [currentTab];
      els.sidebar.innerHTML = "";

      const noteLabel = currentTab === "all" ? "all tools" : `${GROUPS[currentTab].toLowerCase()} tools`;
      els.note.textContent = `Showing ${noteLabel}${searchTerm ? ` • filtered by "${searchTerm}"` : ""}`;

      let rendered = false;

      order.forEach(group => {
        const items = groups[group] || [];
        if (!items.length) return;
        const shouldOpen = currentTab !== "all" || items.some(r => r.id === currentRoute);
        els.sidebar.appendChild(createSection(group, items, shouldOpen));
        rendered = true;
      });

      if (!rendered) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No pages match your current search or tab.";
        els.sidebar.appendChild(empty);
      }
    }

    function updateViewer() {
      const route = byId(currentRoute);
      els.crumb.textContent = route ? route.label : "Finance Department";
      els.viewerTitle.textContent = route ? route.label : "FinanceHub";
      els.viewerSub.textContent = route ? route.src : "Select a page from the menu.";
      [els.openA, els.openB].forEach(btn => btn.disabled = !route);
    }

    function render() {
      buildTabs();
      buildSidebar();
      updateViewer();
    }

    function navigate(id) {
      const route = byId(id);
      if (!route) return;
      currentRoute = route.id;
      els.viewer.src = route.src;
      render();
    }

    function reloadViewer() {
      if (els.viewer.src) els.viewer.src = els.viewer.src;
    }

    function openCurrent() {
      const route = byId(currentRoute);
      if (route) window.open(route.src, "_blank");
    }

    function applyTheme(theme) {
      document.body.dataset.theme = theme;
      try { localStorage.setItem("financehub_theme", theme); } catch {}
      els.theme.textContent = theme === "dark" ? "☀️" : "🌓";
    }

    els.theme.onclick = () =>
      applyTheme(document.body.dataset.theme === "dark" ? "light" : "dark");

    $("reloadBtn").onclick = reloadViewer;
    $("reloadBtnSecondary").onclick = reloadViewer;
    els.openA.onclick = openCurrent;
    els.openB.onclick = openCurrent;
    els.search.addEventListener("input", e => {
      searchTerm = e.target.value || "";
      buildSidebar();
    });

    (() => {
      try {
        applyTheme(localStorage.getItem("financehub_theme") === "dark" ? "dark" : "light");
      } catch {
        applyTheme("light");
      }
      render();
      if (ROUTES.length) navigate(ROUTES[0].id);
    })();
  </script>
</body>
</html>
