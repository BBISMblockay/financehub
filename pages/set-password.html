<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Password | SILO</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --error-bg: #fef2f2;
      --error-text: #b91c1c;
      --error-border: #fecaca;
      --success-bg: #ecfdf5;
      --success-text: #166534;
      --success-border: #bbf7d0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: min(460px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: #0f172a;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .status {
      margin: 18px 0;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }

    .status.error {
      display: block;
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid var(--error-border);
    }

    .status.success {
      display: block;
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid var(--success-border);
    }

    .status.info {
      display: block;
      background: #f8fafc;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      font-size: 15px;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    button {
      width: 100%;
      padding: 13px 16px;
      background: var(--accent);
      color: white;
      font-weight: 600;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s ease, opacity .15s ease;
      margin-top: 6px;
    }

    button:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      display: inline-block;
      vertical-align: -3px;
      margin-right: 8px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer-link {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
    }

    .footer-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">S</div>
      <div>
        <h1>Create password</h1>
        <p class="subtitle">Finish your SILO account setup to continue.</p>
      </div>
    </div>

    <div id="statusBox" class="status info">
      Checking your invite session…
    </div>

    <form id="passwordForm" style="display:none;">
      <div class="field">
        <label for="password">New password</label>
        <input
          id="password"
          type="password"
          autocomplete="new-password"
          placeholder="Create your password"
          minlength="8"
          required
        />
        <div class="hint">Use at least 8 characters.</div>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input
          id="confirmPassword"
          type="password"
          autocomplete="new-password"
          placeholder="Re-enter your password"
          minlength="8"
          required
        />
      </div>

      <button type="submit" id="saveBtn">Save password</button>
    </form>

    <div class="footer-link">
      <a href="/pages/login.html">Back to login</a>
    </div>
  </div>

  <script src="/pages/config.js"></script>
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const config = window.__SILO_CONFIG__ || {};
    const SUPABASE_URL = config.SUPABASE_URL;
    const SUPABASE_ANON_KEY = config.SUPABASE_ANON_KEY;

    const statusBox = document.getElementById("statusBox");
    const passwordForm = document.getElementById("passwordForm");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const saveBtn = document.getElementById("saveBtn");

    function setStatus(type, message) {
      statusBox.className = `status ${type}`;
      statusBox.textContent = message;
    }

    function showForm() {
      passwordForm.style.display = "block";
    }

    function hideForm() {
      passwordForm.style.display = "none";
    }

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
      setStatus("error", "Missing Supabase config. Check /pages/config.js.");
      throw new Error("Missing SUPABASE_URL or SUPABASE_ANON_KEY in window.__SILO_CONFIG__");
    }

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function initializeInviteSession() {
      try {
        const hash = window.location.hash || "";

        if (!hash.includes("access_token=") && !hash.includes("refresh_token=")) {
          const { data, error } = await supabase.auth.getSession();

          if (error) throw error;

          if (data?.session) {
            setStatus("info", "Active session found. Create your password to continue.");
            showForm();
            return;
          }

          setStatus("error", "This setup link is missing or expired. Please request a new invite.");
          hideForm();
          return;
        }

        const hashParams = new URLSearchParams(hash.replace(/^#/, ""));
        const access_token = hashParams.get("access_token");
        const refresh_token = hashParams.get("refresh_token");

        if (!access_token || !refresh_token) {
          setStatus("error", "This invite link is incomplete. Please request a new invite.");
          hideForm();
          return;
        }

        const { error } = await supabase.auth.setSession({
          access_token,
          refresh_token
        });

        if (error) throw error;

        history.replaceState({}, document.title, "/pages/set-password.html");

        setStatus("info", "Invite accepted. Create your password to finish setup.");
        showForm();
      } catch (err) {
        console.error("Invite setup error:", err);
        setStatus("error", err?.message || "Unable to verify invite session.");
        hideForm();
      }
    }

    passwordForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = passwordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();

      if (password.length < 8) {
        setStatus("error", "Password must be at least 8 characters.");
        return;
      }

      if (password !== confirmPassword) {
        setStatus("error", "Passwords do not match.");
        return;
      }

      try {
        saveBtn.disabled = true;
        saveBtn.innerHTML = `<span class="spinner"></span>Saving password...`;
        setStatus("info", "Saving your password...");

        const { error } = await supabase.auth.updateUser({ password });

        if (error) throw error;

        setStatus("success", "Password saved. Redirecting you into SILO...");
        setTimeout(() => {
          window.location.replace("/pages/department-access.html");
        }, 1000);
      } catch (err) {
        console.error("Password update error:", err);
        setStatus("error", err?.message || "Unable to save password.");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "Save password";
      }
    });

    initializeInviteSession();
  </script>
</body>
</html>
