<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Silo ERP — Login</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    .mono { font-variant-numeric: tabular-nums; }
  </style>
</head>

<body class="h-full bg-slate-50 text-slate-900">
  <div class="min-h-full flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white border border-slate-200 rounded-2xl shadow-sm p-6">
      <div class="mb-6">
        <h1 class="text-2xl font-bold tracking-tight">Sign in</h1>
        <p class="text-sm text-slate-600 mt-1">Access Silo ERP securely.</p>
      </div>

      <div id="msg" class="hidden mb-4 text-sm rounded-lg border p-3"></div>

      <form id="authForm" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700">Email</label>
          <input id="email" type="email" autocomplete="email" required
                 class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-400"
                 placeholder="you@company.com" />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700">Password</label>
          <input id="password" type="password" autocomplete="current-password"
                 class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-400"
                 placeholder="••••••••" />
          <p class="mt-2 text-xs text-slate-500">
            Password required for sign-in/sign-up. For magic link, leave password blank.
          </p>
        </div>

        <div class="grid grid-cols-1 gap-2 pt-2">
          <button type="button" id="btnSignIn"
                  class="w-full rounded-xl bg-slate-900 text-white py-2.5 font-semibold hover:bg-slate-800">
            Sign in
          </button>

          <button type="button" id="btnSignUp"
                  class="w-full rounded-xl border border-slate-300 py-2.5 font-semibold hover:bg-slate-50">
            Create account
          </button>

          <button type="button" id="btnMagic"
                  class="w-full rounded-xl border border-slate-200 py-2.5 font-semibold text-slate-700 hover:bg-slate-50">
            Send magic link
          </button>
        </div>

        <div class="pt-2 flex items-center justify-between">
          <button type="button" id="btnSignOut" class="text-sm text-slate-600 hover:text-slate-900">
            Sign out
          </button>
          <span id="sessionState" class="text-xs text-slate-500 mono"></span>
        </div>
      </form>

      <div class="mt-6 pt-4 border-t border-slate-200">
        <p class="text-xs text-slate-500">
          If you just enabled email confirmation, check your inbox after sign-up.
        </p>
      </div>
    </div>
  </div>

  <!-- 1) Load config from same folder -->
  <script src="./config.js"></script>

  <!-- 2) Supabase JS (v2) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const $ = (id) => document.getElementById(id);

    function showMsg(type, text) {
      const el = $('msg');
      el.className = 'mb-4 text-sm rounded-lg border p-3';
      if (type === 'ok') el.classList.add('border-emerald-200','bg-emerald-50','text-emerald-900');
      else if (type === 'warn') el.classList.add('border-amber-200','bg-amber-50','text-amber-900');
      else el.classList.add('border-rose-200','bg-rose-50','text-rose-900');
      el.textContent = text;
      el.classList.remove('hidden');
    }

    function hideMsg() {
      const el = $('msg');
      el.classList.add('hidden');
      el.textContent = '';
    }

    // Validate config
    const CFG = window.__SILO_CONFIG__;
    if (!CFG || !CFG.SUPABASE_URL || !CFG.SUPABASE_ANON_KEY) {
      showMsg('err',
        'Config not loaded. Make sure config.js is in the same /pages/ folder and referenced as "./config.js".'
      );
      throw new Error('Missing window.__SILO_CONFIG__ / SUPABASE_URL / SUPABASE_ANON_KEY');
    }

    // Create Supabase client
    const supabase = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const redirectTo = CFG.REDIRECT_TO || '/executive.html';

    async function refreshSessionState() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user?.email) {
        $('sessionState').textContent = `signed in as ${session.user.email}`;
      } else {
        $('sessionState').textContent = 'not signed in';
      }
    }

    async function goIfAuthed() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {
        window.location.href = redirectTo;
      }
    }

    async function signIn() {
      hideMsg();
      const email = $('email').value.trim();
      const password = $('password').value;

      if (!email || !password) return showMsg('err', 'Email + password required to sign in.');

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return showMsg('err', error.message);

      showMsg('ok', 'Signed in. Redirecting…');
      setTimeout(() => window.location.href = redirectTo, 250);
    }

    async function signUp() {
      hideMsg();
      const email = $('email').value.trim();
      const password = $('password').value;

      if (!email || !password) return showMsg('err', 'Email + password required to create account.');

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: window.location.origin + redirectTo
        }
      });

      if (error) return showMsg('err', error.message);

      // If email confirmation is on, session may be null until confirmed
      if (!data.session && (CFG.EXPECT_EMAIL_CONFIRMATION ?? true)) {
        showMsg('warn', 'Account created. Check your email to confirm, then come back and sign in.');
      } else {
        showMsg('ok', 'Account created and signed in. Redirecting…');
        setTimeout(() => window.location.href = redirectTo, 250);
      }
      await refreshSessionState();
    }

    async function magicLink() {
      hideMsg();
      const email = $('email').value.trim();
      if (!email) return showMsg('err', 'Email required for magic link.');

      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: window.location.origin + redirectTo
        }
      });

      if (error) return showMsg('err', error.message);
      showMsg('ok', 'Magic link sent. Check your email.');
    }

    async function signOut() {
      hideMsg();
      const { error } = await supabase.auth.signOut();
      if (error) return showMsg('err', error.message);
      showMsg('ok', 'Signed out.');
      await refreshSessionState();
    }

    // Wire buttons
    $('btnSignIn').addEventListener('click', signIn);
    $('btnSignUp').addEventListener('click', signUp);
    $('btnMagic').addEventListener('click', magicLink);
    $('btnSignOut').addEventListener('click', signOut);

    // Boot
    (async () => {
      await refreshSessionState();

      // If you landed here already authed, bounce to app
      await goIfAuthed();

      // React to auth changes (also handles magic-link redirect back)
      supabase.auth.onAuthStateChange(async (event, session) => {
        await refreshSessionState();
        if (event === 'SIGNED_IN' && session?.user) {
          window.location.href = redirectTo;
        }
      });
    })();
  </script>
</body>
</html>
