<!-- /pages/login.html -->
<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Silo ERP — Login</title>

  <!-- Tailwind (ok for now; later replace for production) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase JS v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Config -->
  <script src="./config.js"></script>

  <style>
    :root { color-scheme: light; }
    .mono { font-variant-numeric: tabular-nums; }
    .shadow-soft { box-shadow: 0 10px 30px rgba(2,6,23,.08); }
  </style>
</head>

<body class="h-full bg-slate-50 text-slate-900">
  <div class="min-h-full flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md">
      <div class="mb-6">
        <div class="flex items-center gap-3">
          <div class="h-10 w-10 rounded-xl bg-slate-900 text-white flex items-center justify-center font-semibold shadow-soft">
            S
          </div>
          <div>
            <div class="text-lg font-semibold leading-tight">Silo ERP</div>
            <div class="text-sm text-slate-600">Sign in to continue</div>
          </div>
        </div>
      </div>

      <div class="rounded-2xl bg-white border border-slate-200 p-6 shadow-soft">
        <div id="status" class="hidden mb-4 rounded-xl border px-3 py-2 text-sm"></div>

        <div class="mb-5 flex rounded-xl bg-slate-100 p-1">
          <button id="tabPassword" class="flex-1 rounded-lg px-3 py-2 text-sm font-medium bg-white shadow-sm">Password</button>
          <button id="tabMagic" class="flex-1 rounded-lg px-3 py-2 text-sm font-medium text-slate-600">Magic link</button>
        </div>

        <form id="formPassword" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700">Email</label>
            <input id="email1" type="email" autocomplete="email"
                   class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900"
                   placeholder="you@baseballism.com" required />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700">Password</label>
            <input id="password" type="password" autocomplete="current-password"
                   class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900"
                   placeholder="••••••••" required />
          </div>

          <button id="btnLogin" type="submit"
                  class="w-full rounded-xl bg-slate-900 text-white py-2.5 font-semibold hover:bg-slate-800 disabled:opacity-60 disabled:cursor-not-allowed">
            Sign in
          </button>

          <div class="pt-1 flex items-center justify-between">
            <button id="btnGoSignup" type="button" class="text-sm font-medium text-slate-900 hover:underline">
              Create account
            </button>
            <button id="btnForgot" type="button" class="text-sm text-slate-600 hover:underline">
              Forgot password?
            </button>
          </div>
        </form>

        <form id="formMagic" class="space-y-4 hidden">
          <div>
            <label class="block text-sm font-medium text-slate-700">Email</label>
            <input id="email2" type="email" autocomplete="email"
                   class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900"
                   placeholder="you@company.com" required />
          </div>

          <button id="btnMagic" type="submit"
                  class="w-full rounded-xl bg-slate-900 text-white py-2.5 font-semibold hover:bg-slate-800 disabled:opacity-60 disabled:cursor-not-allowed">
            Email me a sign-in link
          </button>

          <div class="text-xs text-slate-500 leading-relaxed">
            We’ll send a one-time link. If your project requires email confirmation, you may need to confirm first.
          </div>
        </form>

        <dialog id="dlgSignup" class="rounded-2xl p-0 w-full max-w-md">
          <div class="bg-white rounded-2xl border border-slate-200 shadow-soft">
            <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
              <div>
                <div class="text-base font-semibold">Create account</div>
                <div class="text-sm text-slate-600">This creates a Supabase auth user</div>
              </div>
              <button id="btnCloseSignup" class="rounded-lg px-2 py-1 text-slate-600 hover:bg-slate-100">✕</button>
            </div>

            <form id="formSignup" class="p-6 space-y-4">
              <div>
                <label class="block text-sm font-medium text-slate-700">Name</label>
                <input id="name3" type="text" autocomplete="name"
                       class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900"
                       placeholder="full name" />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700">Email</label>
                <input id="email3" type="email" autocomplete="email"
                       class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900"
                       placeholder="you@company.com" required />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700">Password</label>
                <input id="password3" type="password" autocomplete="new-password"
                       class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900"
                       placeholder="Minimum 6 characters" required />
              </div>

              <button id="btnSignup" type="submit"
                      class="w-full rounded-xl bg-slate-900 text-white py-2.5 font-semibold hover:bg-slate-800 disabled:opacity-60 disabled:cursor-not-allowed">
                Create account
              </button>

              <div class="text-xs text-slate-500 leading-relaxed">
                If <span class="mono">EXPECT_EMAIL_CONFIRMATION</span> is true, you may need to confirm your email before you can sign in.
              </div>
            </form>
          </div>
        </dialog>

        <div class="mt-6 text-xs text-slate-500">
          <div class="flex items-center justify-between">
            <span class="mono" id="envInfo">—</span>
            <button id="btnSignout" class="hidden text-slate-600 hover:underline">Sign out</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const CFG = window.__SILO_CONFIG__ || {};
      const SUPABASE_URL = (CFG.SUPABASE_URL || "").trim();
      const SUPABASE_ANON_KEY = (CFG.SUPABASE_ANON_KEY || "").trim();
      const REDIRECT_TO = (CFG.REDIRECT_TO || "/executive.html").trim();
      const EXPECT_EMAIL_CONFIRMATION = !!CFG.EXPECT_EMAIL_CONFIRMATION;

      const statusEl = document.getElementById("status");
      const envInfo = document.getElementById("envInfo");
      const btnSignout = document.getElementById("btnSignout");

      const ROUTE_BY_DEPARTMENT = {
        exec: "/finance.html",
        finance: "/finance.html",
        ops: "/ops.html",
        marketing: "/marketing.html",
        retail: "/retail.html"
      };

      function showStatus(msg, type = "info") {
        statusEl.classList.remove("hidden");
        statusEl.className =
          "mb-4 rounded-xl border px-3 py-2 text-sm " +
          (type === "error"
            ? "border-rose-200 bg-rose-50 text-rose-800"
            : type === "success"
              ? "border-emerald-200 bg-emerald-50 text-emerald-800"
              : "border-slate-200 bg-slate-50 text-slate-800");
        statusEl.textContent = msg;
      }

      function clearStatus() {
        statusEl.classList.add("hidden");
        statusEl.textContent = "";
      }

      function setLoading(btn, loading, textWhenNotLoading) {
        btn.disabled = loading;
        btn.textContent = loading ? "Working…" : textWhenNotLoading;
      }

      function assertConfig() {
        if (!SUPABASE_URL || !SUPABASE_URL.startsWith("https://") || !SUPABASE_URL.includes(".supabase.co")) {
          showStatus(
            "Config error: SUPABASE_URL is missing or not a valid *.supabase.co URL. " +
            "Your config.js must be loaded and SUPABASE_URL must look like https://<ref>.supabase.co",
            "error"
          );
          return false;
        }
        if (!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.length < 50) {
          showStatus("Config error: SUPABASE_ANON_KEY is missing or looks wrong.", "error");
          return false;
        }
        return true;
      }

      if (!assertConfig()) return;

      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });

      envInfo.textContent = `Supabase: ${SUPABASE_URL.replace("https://", "")}`;

      async function getUserProfile(userId) {
        const { data, error } = await supabaseClient
          .from("profiles")
          .select("role, department, is_active")
          .eq("id", userId)
          .single();

        if (error) throw error;
        if (!data) throw new Error("No profile found for this user.");
        if (!data.is_active) throw new Error("Your account is inactive.");

        return data;
      }

      function getRouteFromProfile(profile) {
        const role = (profile.role || "").toLowerCase();
        const department = (profile.department || "").toLowerCase();

        if (role === "owner") return "/executive.html";
        if (role === "admin" && department === "exec") return "/executive.html";

        return ROUTE_BY_DEPARTMENT[department] || REDIRECT_TO;
      }

      async function resolveAndRedirect(userId) {
        const profile = await getUserProfile(userId);
        const route = getRouteFromProfile(profile);
        window.location.href = route;
      }

      const tabPassword = document.getElementById("tabPassword");
      const tabMagic = document.getElementById("tabMagic");
      const formPassword = document.getElementById("formPassword");
      const formMagic = document.getElementById("formMagic");

      function setTab(which) {
        clearStatus();
        if (which === "password") {
          tabPassword.className = "flex-1 rounded-lg px-3 py-2 text-sm font-medium bg-white shadow-sm";
          tabMagic.className = "flex-1 rounded-lg px-3 py-2 text-sm font-medium text-slate-600";
          formPassword.classList.remove("hidden");
          formMagic.classList.add("hidden");
        } else {
          tabMagic.className = "flex-1 rounded-lg px-3 py-2 text-sm font-medium bg-white shadow-sm";
          tabPassword.className = "flex-1 rounded-lg px-3 py-2 text-sm font-medium text-slate-600";
          formMagic.classList.remove("hidden");
          formPassword.classList.add("hidden");
        }
      }

      tabPassword.addEventListener("click", () => setTab("password"));
      tabMagic.addEventListener("click", () => setTab("magic"));

      const dlgSignup = document.getElementById("dlgSignup");
      const btnGoSignup = document.getElementById("btnGoSignup");
      const btnCloseSignup = document.getElementById("btnCloseSignup");
      btnGoSignup.addEventListener("click", () => dlgSignup.showModal());
      btnCloseSignup.addEventListener("click", () => dlgSignup.close());

      async function bootstrap() {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) {
          showStatus("Auth error: " + error.message, "error");
          return;
        }

        if (data?.session?.user) {
          btnSignout.classList.remove("hidden");
          showStatus("You are already signed in. Redirecting…", "success");

          try {
            await resolveAndRedirect(data.session.user.id);
          } catch (err) {
            showStatus(err?.message || "Could not determine user route.", "error");
          }
        }
      }

      bootstrap();

      const btnLogin = document.getElementById("btnLogin");
      formPassword.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearStatus();

        const email = document.getElementById("email1").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          return showStatus("Enter email and password.", "error");
        }

        setLoading(btnLogin, true, "Sign in");
        try {
          const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
          if (error) throw error;

          if (!data?.session?.user) {
            if (EXPECT_EMAIL_CONFIRMATION) {
              showStatus("Signed in request accepted. If email confirmation is required, confirm your email then sign in again.", "info");
            } else {
              showStatus("Signed in, but no session returned. Check auth settings.", "error");
            }
            return;
          }

          showStatus("Signed in. Redirecting…", "success");
          await resolveAndRedirect(data.session.user.id);
        } catch (err) {
          showStatus(err?.message || "Sign-in failed.", "error");
        } finally {
          setLoading(btnLogin, false, "Sign in");
        }
      });

      const btnMagic = document.getElementById("btnMagic");
      formMagic.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearStatus();

        const email = document.getElementById("email2").value.trim();
        if (!email) return showStatus("Enter your email.", "error");

        setLoading(btnMagic, true, "Email me a sign-in link");
        try {
          const redirectTo = window.location.origin + window.location.pathname;

          const { error } = await supabaseClient.auth.signInWithOtp({
            email,
            options: { emailRedirectTo: redirectTo }
          });

          if (error) throw error;
          showStatus("Magic link sent. Check your inbox.", "success");
        } catch (err) {
          showStatus(err?.message || "Could not send magic link.", "error");
        } finally {
          setLoading(btnMagic, false, "Email me a sign-in link");
        }
      });

      const formSignup = document.getElementById("formSignup");
      const btnSignup = document.getElementById("btnSignup");
      formSignup.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearStatus();

        const name = document.getElementById("name3").value.trim();
        const email = document.getElementById("email3").value.trim();
        const password = document.getElementById("password3").value;

        if (!email || !password) return showStatus("Email and password are required.", "error");
        if (password.length < 6) return showStatus("Password must be at least 6 characters.", "error");

        setLoading(btnSignup, true, "Create account");
        try {
          const redirectTo = window.location.origin + window.location.pathname;

          const { data, error } = await supabaseClient.auth.signUp({
            email,
            password,
            options: {
              emailRedirectTo: redirectTo,
              data: { name }
            }
          });

          if (error) throw error;

          dlgSignup.close();

          if (EXPECT_EMAIL_CONFIRMATION && !data?.session) {
            showStatus("Account created. Confirm your email, then come back and sign in.", "success");
          } else if (data?.user?.id) {
            showStatus("Account created. Redirecting…", "success");
            try {
              await resolveAndRedirect(data.user.id);
            } catch (err) {
              showStatus(
                err?.message || "Account created, but no route/profile was found yet. Have an admin assign department access.",
                "error"
              );
            }
          } else {
            showStatus("Account created. Sign in once your access is assigned.", "success");
          }
        } catch (err) {
          showStatus(err?.message || "Signup failed.", "error");
        } finally {
          setLoading(btnSignup, false, "Create account");
        }
      });

      const btnForgot = document.getElementById("btnForgot");
      btnForgot.addEventListener("click", async () => {
        clearStatus();
        const email = (document.getElementById("email1").value || "").trim();
        if (!email) return showStatus("Enter your email in the Email field first.", "error");

        try {
          const redirectTo = window.location.origin + window.location.pathname;
          const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo });
          if (error) throw error;
          showStatus("Password reset email sent.", "success");
        } catch (err) {
          showStatus(err?.message || "Could not send reset email.", "error");
        }
      });

      btnSignout.addEventListener("click", async () => {
        clearStatus();
        try {
          const { error } = await supabaseClient.auth.signOut();
          if (error) throw error;
          showStatus("Signed out.", "success");
          btnSignout.classList.add("hidden");
        } catch (err) {
          showStatus(err?.message || "Sign out failed.", "error");
        }
      });

      supabaseClient.auth.onAuthStateChange((event, session) => {
        if (session) btnSignout.classList.remove("hidden");
      });
    })();
  </script>
</body>
</html>
