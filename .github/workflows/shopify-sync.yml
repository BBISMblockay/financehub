name: Shopify API Sync

on:
  workflow_dispatch:
    inputs:
      sync_mode:
        description: incremental | history | full
        required: false
        default: incremental
      company_entity_id:
        description: Optional company UUID (limit to one entity)
        required: false
      connection_id:
        description: Optional shopify_connections.id
        required: false
      skip_inventory:
        description: Set true to skip inventory snapshot
        required: false
        default: 'false'
      skip_sales:
        description: Set true to skip sales import
        required: false
        default: 'false'
      skip_catalog:
        description: Set true to skip products_master catalog sync
        required: false
        default: 'false'
      history_days:
        description: Override history days for history/full mode
        required: false
      history_chunk_days:
        description: Days per history window (default 30)
        required: false
        default: '30'
  schedule:
    # 11:00 UTC — after nightly Sheets sync (10:30 UTC)
    - cron: "0 11 * * *"

jobs:
  shopify-sync:
    runs-on: ubuntu-latest
    # Long enough for a full 730-day history re-import of the main store
    # (~25 windows at ~10 min each); incremental runs finish in minutes.
    timeout-minutes: 330

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SHOPIFY_SYNC_MODE: ${{ github.event.inputs.sync_mode || 'incremental' }}
      SHOPIFY_ONLY_COMPANY_ID: ${{ github.event.inputs.company_entity_id || '' }}
      SHOPIFY_ONLY_CONNECTION_ID: ${{ github.event.inputs.connection_id || '' }}
      SHOPIFY_SKIP_INVENTORY: ${{ github.event.inputs.skip_inventory || 'false' }}
      SHOPIFY_SKIP_SALES: ${{ github.event.inputs.skip_sales || 'false' }}
      SHOPIFY_SKIP_CATALOG: ${{ github.event.inputs.skip_catalog || 'false' }}
      SHOPIFY_HISTORY_DAYS: ${{ github.event.inputs.history_days || '' }}
      SHOPIFY_HISTORY_CHUNK_DAYS: ${{ github.event.inputs.history_chunk_days || '30' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify Supabase envs exist
        run: |
          test -n "$SUPABASE_URL" || (echo "Missing SUPABASE_URL" && exit 1)
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "Missing SUPABASE_SERVICE_ROLE_KEY" && exit 1)
          echo "Supabase env vars present"

      - name: Install dependencies
        run: npm install

      - name: Run Shopify sync orchestrator
        run: node scripts/shopify-sync.mjs

      - name: Refresh inventory mat view
        # Runs even if the orchestrator step above failed (e.g. its own
        # inline mat-view refresh timed out) or errored elsewhere — a slow
        # cache refresh shouldn't block this from being retried, and the
        # insights step below depends on base tables, not this step's success.
        if: ${{ !cancelled() }}
        run: |
          node -e "
          import('@supabase/supabase-js').then(({ createClient }) => {
            const db = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY);
            return db.rpc('refresh_inventory_current_mv');
          }).then(({ error }) => {
            if (error) { console.error('Mat view refresh failed:', error.message); process.exit(1); }
            console.log('inventory_on_hand_current_mv refreshed');
          });
          "

      - name: Generate Action Items & Insights digest
        # Runs after sales/inventory are fresh so the sales/stockout findings
        # reflect tonight's data. ANTHROPIC_API_KEY is optional — without it
        # the script still stores findings (no AI narrative) rather than
        # failing. Also runs regardless of earlier step outcomes (see above)
        # so a mat-view timeout can never leave this digest stale again —
        # continue-on-error covers an LLM API hiccup within this step itself.
        if: ${{ !cancelled() }}
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-insights.mjs
