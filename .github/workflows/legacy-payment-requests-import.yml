name: Legacy Payment Requests Import

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (no database writes)"
        required: true
        default: true
        type: boolean
      source:
        description: "Where to read rows from"
        required: true
        default: "sheet"
        type: choice
        options:
          - sheet
          - file
      unpaid_only:
        description: "Only import unpaid rows (New + Hold queues)"
        required: true
        default: true
        type: boolean
      file_path:
        description: "Path to export file in this repo (source=file only)"
        required: false
        default: "data/legacy-payment-requests-pilot.csv"
        type: string
      company_entity_id:
        description: "Company UUID (blank = Baseballism)"
        required: false
        default: ""
        type: string

jobs:
  import-legacy-payment-requests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Supabase envs exist
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          test -n "$SUPABASE_URL" || (echo "Missing SUPABASE_URL repo secret" && exit 1)
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "Missing SUPABASE_SERVICE_ROLE_KEY repo secret" && exit 1)
          echo "Supabase env vars present"

      - name: Verify import file exists
        if: ${{ inputs.source == 'file' }}
        run: |
          FILE="${{ inputs.file_path }}"
          test -f "$FILE" || (echo "File not found in repo: $FILE" && exit 1)
          echo "Import file: $FILE"

      - name: Install dependencies
        run: npm install

      - name: Run legacy payment requests import
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "dry_run=${{ inputs.dry_run }} source=${{ inputs.source }} unpaid_only=${{ inputs.unpaid_only }}"
          ARGS=()
          if [ "${{ inputs.source }}" = "sheet" ]; then
            ARGS+=(--from-sheet)
          else
            ARGS+=(--file "${{ inputs.file_path }}")
          fi
          if [ "${{ inputs.unpaid_only }}" = "true" ]; then
            ARGS+=(--unpaid-only)
          fi
          if [ -n "${{ inputs.company_entity_id }}" ]; then
            ARGS+=(--company "${{ inputs.company_entity_id }}")
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          node scripts/import-payment-requests-legacy.mjs "${ARGS[@]}"
