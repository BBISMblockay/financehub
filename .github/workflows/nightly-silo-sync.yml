name: Nightly Silo Sync

on:
  workflow_dispatch:
  schedule:
    # 2:15 AM UTC daily
    - cron: "15 2 * * *"

jobs:
  sync-silo:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Silo inventory + sales sync
        run: node scripts/sync-silo-inventory-sales.mjs
