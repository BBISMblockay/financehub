name: Nightly Silo Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * *"

jobs:
  sync-silo:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Supabase envs exist
        run: |
          test -n "$SUPABASE_URL" || (echo "Missing SUPABASE_URL" && exit 1)
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "Missing SUPABASE_SERVICE_ROLE_KEY" && exit 1)
          echo "Supabase env vars present"

      - name: Install dependencies
        run: npm install

      - name: Run Silo inventory + sales sync
        run: node scripts/sync-silo-inventory-sales.mjs
