name: One-Time Sales Backfill

on:
  workflow_dispatch:
    inputs:
      location_tag:
        description: "Location tag to backfill, or all"
        required: true
        default: "scottsdale"
        type: string

jobs:
  backfill-sales:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run sales backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SILO_SALES_SYNC_MODE: backfill
          SILO_ONLY_SOURCE: ${{ inputs.location_tag }}
          SILO_SKIP_INVENTORY: "true"
          SILO_SKIP_SALES: "false"
          SILO_SKIP_SUMMARY_REFRESH: "true"
        run: |
          echo "Requested location_tag=${{ inputs.location_tag }}"
          echo "SILO_SALES_SYNC_MODE=$SILO_SALES_SYNC_MODE"
          echo "SILO_ONLY_SOURCE=$SILO_ONLY_SOURCE"
          echo "SILO_SKIP_INVENTORY=$SILO_SKIP_INVENTORY"
          node scripts/sync-silo-inventory-sales.mjs
