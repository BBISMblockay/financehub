name: Backfill company_entity_id (Large Tables)

on:
  workflow_dispatch:
    inputs:
      tables:
        description: "Comma-separated tables to backfill"
        required: true
        default: "sales_by_day,inventory_on_hand"
        type: string
      batch_size:
        description: "Rows per batch"
        required: false
        default: "5000"
        type: string

jobs:
  backfill:
    name: Backfill ${{ inputs.tables }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKFILL_TABLES: ${{ inputs.tables }}
          BATCH_SIZE: ${{ inputs.batch_size }}
        run: node scripts/backfill-company-entity-large-tables.mjs
