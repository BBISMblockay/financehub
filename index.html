<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SILO</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #2563eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
    }

    .card {
      width: min(460px, calc(100vw - 32px));
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: #0f172a;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
    }

    p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
      font-size: 14px;
      color: var(--text);
    }

    .sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #cbd5e1;
      border-top-color: var(--accent);
      border-radius: 50%;
      display: inline-block;
      vertical-align: -3px;
      margin-right: 10px;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .link {
      margin-top: 16px;
      display: none;
      font-size: 14px;
    }

    .link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">S</div>
      <div>
        <h1>SILO</h1>
        <p>Preparing your access…</p>
      </div>
    </div>

    <div class="status">
      <span class="spinner"></span>
      <span id="statusText">Checking your sign-in flow.</span>
      <div class="sub" id="subText">You will be redirected automatically.</div>
    </div>

    <div class="link" id="manualLink"></div>
  </div>

  <script src="/pages/config.js"></script>
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const config = window.__SILO_CONFIG__ || {};
    const SUPABASE_URL = config.SUPABASE_URL;
    const SUPABASE_ANON_KEY = config.SUPABASE_ANON_KEY;

    const statusText = document.getElementById("statusText");
    const subText = document.getElementById("subText");
    const manualLink = document.getElementById("manualLink");

    function hasAuthHash(hash) {
      if (!hash) return false;
      const lower = hash.toLowerCase();
      return (
        lower.includes("access_token=") ||
        lower.includes("refresh_token=") ||
        lower.includes("type=invite") ||
        lower.includes("type=recovery") ||
        lower.includes("type=magiclink") ||
        lower.includes("type=signup")
      );
    }

    function showManualLink(label, url) {
      manualLink.style.display = "block";
      manualLink.innerHTML = `<a href="${url}">${label}</a>`;
    }

    function go(url, delay = 700) {
      setTimeout(() => {
        window.location.replace(url);
      }, delay);
    }

    async function init() {
      const hash = window.location.hash || "";

      // 1. Invite / recovery / magic link hash present
      if (hasAuthHash(hash)) {
        statusText.textContent = "Invite detected. Sending you to account setup.";
        subText.textContent = "Finish setup first, then continue into SILO.";
        showManualLink("Continue to setup", `/pages/set-password.html${hash}`);
        go(`/pages/set-password.html${hash}`);
        return;
      }

      // 2. If Supabase config exists, check real auth session
      if (SUPABASE_URL && SUPABASE_ANON_KEY) {
        try {
          const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          const { data, error } = await supabase.auth.getSession();

          if (error) {
            console.error("Session check failed:", error);
          }

          if (data?.session) {
            statusText.textContent = "You are already signed in. Sending you to SILO.";
            subText.textContent = "Your session is active in this browser.";
            showManualLink("Continue to department access", "/pages/department-access.html");
            go("/pages/department-access.html");
            return;
          }
        } catch (err) {
          console.error("Supabase init failed:", err);
        }
      }

      // 3. No session -> login
      statusText.textContent = "No active session found. Sending you to login.";
      subText.textContent = "Use your SILO email login to continue.";
      showManualLink("Go to login", "/pages/login.html");
      go("/pages/login.html");
    }

    init();
  </script>
</body>
</html>
