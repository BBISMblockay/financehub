<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SILO · Integrations</title>
  <link rel="stylesheet" href="beacon.css" />
  <link rel="stylesheet" href="silo-brand.css" />
  <link rel="stylesheet" href="beacon-mirrors-unified.css" />
  <link rel="stylesheet" href="v2-mobile.css" />
  <script src="v2-shell.js" defer></script>
  <script src="../pages/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
  <script src="nav-config.js"></script>
  <script src="silo-chrome.js"></script>
  <script src="shopify-scopes.js"></script>
  <style>
    /* ── Page layout ── */
    .int-page {
      padding: 20px 24px;
      max-width: 1400px;
    }
    .int-section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--bcn-ink-3);
      margin: 0 0 10px;
    }
    .int-stores-grid {
      display: block;
      margin-bottom: 24px;
    }

    /* ── Store table ── */
    .int-table-wrap {
      background: var(--bcn-surface, #fff);
      border: 1px solid var(--bcn-border, #e5e7eb);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .int-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .int-table thead th {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--bcn-ink-3);
      padding: 9px 12px;
      text-align: left;
      background: var(--bcn-surface-2, #f9fafb);
      border-bottom: 1px solid var(--bcn-border, #e5e7eb);
      white-space: nowrap;
    }
    .int-table tbody tr {
      border-bottom: 1px solid var(--bcn-border, #e5e7eb);
      transition: background 0.1s;
    }
    .int-table tbody tr:last-child { border-bottom: none; }
    .int-table tbody tr:hover { background: #fafafa; }
    .int-table td {
      padding: 10px 12px;
      vertical-align: middle;
      white-space: nowrap;
    }

    /* status dot */
    .int-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      background: #d1d5db;
      flex-shrink: 0;
    }
    .int-dot--ok  { background: #22c55e; }
    .int-dot--err { background: #ef4444; }

    /* store name cell */
    .int-store-name { font-weight: 600; color: var(--bcn-ink); font-size: 13px; }
    .int-store-domain { font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--bcn-ink-3); margin-top: 1px; }

    /* nightly toggle */
    .int-nightly-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 12px;
      color: var(--bcn-ink-2);
    }
    .int-nightly-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 2px 6px;
      border-radius: 99px;
    }
    .int-nightly-badge--on  { background: #dcfce7; color: #166534; }
    .int-nightly-badge--off { background: #f3f4f6; color: #9ca3af; }

    /* buttons */
    .int-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 26px;
      padding: 0 9px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      background: none;
      transition: background 0.1s, border-color 0.1s;
      white-space: nowrap;
      font-family: inherit;
    }
    .int-btn--ghost { border-color: var(--bcn-border, #e5e7eb); color: var(--bcn-ink-2); background: #fff; }
    .int-btn--ghost:hover { background: #f3f4f6; }
    .int-btn--ghost:disabled { opacity: 0.4; cursor: default; }
    .int-btn--primary { background: var(--bcn-accent, #2563eb); color: #fff; border-color: var(--bcn-accent, #2563eb); }
    .int-btn--primary:hover { opacity: 0.88; }
    .int-btn--danger { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
    .int-btn--danger:hover { background: #fee2e2; }
    .int-btn--warn { background: #fffbeb; color: #92400e; border-color: #fde68a; }
    .int-btn--warn:hover { background: #fef3c7; }
    .int-btn-group { display: flex; gap: 3px; align-items: center; }

    /* status / progress inline */
    .int-sync-status {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--bcn-ink-3);
      white-space: nowrap;
    }
    .int-sync-status--ok { color: #166534; }
    .int-sync-status--running { color: var(--bcn-accent, #2563eb); }

    /* progress bar row (spans full table width) */
    .int-progress-tr td {
      padding: 0 12px 10px;
      white-space: normal;
    }
    .int-progress {
      display: none;
      padding: 8px 10px;
      background: var(--bcn-surface-2, #f8f9fa);
      border-radius: 6px;
      border: 1px solid var(--bcn-border, #e5e7eb);
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--bcn-ink-2);
    }
    .int-progress.active { display: block; }
    .int-progress-bar { height: 3px; background: #e5e7eb; border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .int-progress-bar > span { display: block; height: 100%; background: var(--bcn-accent, #2563eb); transition: width 0.25s ease; }

    /* location mapper row */
    .int-loc-tr td { padding: 0; white-space: normal; }
    .int-loc-panel {
      padding: 12px 16px;
      background: var(--bcn-surface-2, #f9fafb);
      border-top: 1px solid var(--bcn-border, #e5e7eb);
    }
    .int-loc-panel[hidden] { display: none !important; }
    .int-loc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .int-loc-summary { font-size: 12px; font-weight: 500; color: var(--bcn-ink-2); }
    .int-loc-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .int-loc-table th {
      text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--bcn-ink-3); padding: 4px 6px 6px 0;
      border-bottom: 1px solid var(--bcn-border, #e5e7eb);
    }
    .int-loc-table td { padding: 8px 6px 8px 0; vertical-align: top; border-bottom: 1px solid var(--bcn-border, #e5e7eb); white-space: normal; }
    .int-loc-table tr:last-child td { border-bottom: none; }
    .int-loc-shopify-name { font-weight: 500; color: var(--bcn-ink); font-size: 12px; }
    .int-loc-shopify-meta { font-size: 10px; color: var(--bcn-ink-3); font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }
    .int-loc-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px; }
    .int-loc-fields .bcn-field, .int-loc-fields select.bcn-field { font-size: 11px; height: 28px; padding: 0 8px; }
    .int-loc-mapped { color: #166534; font-size: 11px; font-family: 'IBM Plex Mono', monospace; }
    .int-loc-unmapped { color: #92400e; font-size: 11px; }

    /* scope warning */
    .int-scope-warn {
      padding: 6px 10px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 5px;
      font-size: 11px;
      color: #92400e;
      line-height: 1.4;
      white-space: normal;
    }

    /* add store row */
    .int-add-row td { padding: 10px 12px; }
    .int-add-trigger {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--bcn-ink-3);
      cursor: pointer;
      padding: 4px 0;
    }
    .int-add-trigger:hover { color: var(--bcn-accent, #2563eb); }
    .int-add-form {
      display: none;
      padding: 12px 0 4px;
      max-width: 420px;
    }
    .int-add-form.open { display: block; }
    .int-add-form .bcn-field-group { margin-bottom: 10px; }
    .int-add-form .form-row { display: flex; gap: 8px; align-items: flex-end; }
    .int-add-form .form-row .bcn-field-group { flex: 1; margin-bottom: 0; }

    .test-result {
      display: none; padding: 7px 10px; border-radius: 5px;
      font-size: 11px; font-family: 'IBM Plex Mono', monospace; margin-top: 8px;
    }
    .test-result.ok  { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; display: block; }
    .test-result.err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block; }
    .test-result.warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; display: block; }

    .empty-state { padding: 32px; text-align: center; color: var(--bcn-ink-3); font-size: 13px; }
    .empty-state strong { display: block; font-size: 14px; color: var(--bcn-ink-2); margin-bottom: 4px; }

    /* hide legacy helpers that aren't used in table layout */
    .int-sync-row { display: none; }
    .int-sync-label { display: none; }
    .int-sync-toggle { display: none; }
    .int-nightly-row { display: none; }
    .int-actions { display: none; }
    .int-store-card { display: contents; }
    .int-store-head { display: none; }
    .int-store-head-actions { display: none; }
    .int-action-group { display: none; }
    .int-last-sync { display: none; }
  </style>
</head>
<body>
  <div class="silo-app" id="silo-app">
    <main class="silo-main">
      <header class="bcn-header">
        <div style="flex:1;min-width:0;">
          <div class="bcn-header-title"><h1>Integrations</h1></div>
        </div>
      </header>

      <div class="bcn-status" id="status" hidden></div>

      <div class="int-page">
        <p class="int-section-label">Shopify stores</p>
        <div class="int-table-wrap">
          <table class="int-table">
            <thead>
              <tr>
                <th style="width:20px;"></th>
                <th>Store</th>
                <th>Nightly sync</th>
                <th>Sales history</th>
                <th>Inventory</th>
                <th>Locations</th>
                <th>Last import</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="shopify-connections-list">
              <tr><td colspan="8"><div class="empty-state" id="shopify-empty"><strong>No stores connected</strong>Add a Shopify store below</div></td></tr>
            </tbody>
            <tfoot>
              <tr class="int-add-row" id="shopify-add-card-wrap">
                <td colspan="8">
                  <div class="int-add-trigger" id="btn-add-shopify" role="button" tabindex="0">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                      <circle cx="8" cy="8" r="6.5"/>
                      <line x1="8" y1="5" x2="8" y2="11"/>
                      <line x1="5" y1="8" x2="11" y2="8"/>
                    </svg>
                    Add Shopify store
                  </div>
                  <div class="int-add-form add-form" id="shopify-add-form">
                    <div class="bcn-field-group">
                      <label class="bcn-label" for="shop-domain">Shop domain</label>
                      <input class="bcn-field bcn-field--mono" id="shop-domain" type="text"
                        placeholder="yourstore.myshopify.com" autocomplete="off" spellcheck="false" />
                    </div>
                    <div class="form-row">
                      <button class="bcn-btn bcn-btn--ghost" id="btn-cancel-add">Cancel</button>
                      <button class="bcn-btn bcn-btn--primary" id="btn-connect-shopify">Connect with Shopify →</button>
                    </div>
                    <div class="test-result" id="test-result"></div>
                  </div>
                </td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    const cfg = window.__SILO_CONFIG__ || {};
    const SUPABASE_URL = cfg.SUPABASE_URL || '';
    const SUPABASE_ANON_KEY = cfg.SUPABASE_ANON_KEY || '';

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
      document.getElementById('status').textContent = 'Missing Supabase config';
      document.getElementById('status').className = 'bcn-status bcn-status--neg';
      document.getElementById('status').hidden = false;
    }

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const FUNCTIONS_URL = SUPABASE_URL.replace('/rest/v1', '') + '/functions/v1';

    function setStatus(msg, type = 'info', ms = 0) {
      const el = document.getElementById('status');
      el.className = `bcn-status bcn-status--${type}`;
      el.textContent = msg;
      el.hidden = false;
      if (ms) setTimeout(() => { el.hidden = true; }, ms);
    }

    // ── Auth + Chrome ──────────────────────────────────────────────
    let _session = null;
    let _co = null;

    db.auth.getSession().then(async ({ data: { session } }) => {
      if (!session) { window.location.href = '/pages/login.html'; return; }
      _session = session;

      const { data: profile } = await db
        .from('profiles')
        .select('name, email, role, active_company_id')
        .eq('id', session.user.id)
        .single();

      if (profile?.role !== 'owner' && profile?.role !== 'admin') {
        setStatus('Integrations settings require admin access.', 'neg');
        return;
      }

      _co = window.__SILO_CONFIG__?.getActiveCompany?.() || null;

      window.SiloChrome.mount({
        appEl: '#silo-app',
        active: 'settings/integrations',
        user: { email: profile?.email || session.user.email, role: profile?.role },
        crumbs: ['Settings', 'Integrations'],
        supabaseClient: db,
      });

      loadConnections();

      // Handle OAuth redirect-back
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('oauth_connected')) {
        setStatus('✓ Shopify store connected — enable sync when ready.', 'pos', 8000);
        history.replaceState({}, '', window.location.pathname);
      } else if (urlParams.get('oauth_error')) {
        setStatus('Shopify connection failed: ' + urlParams.get('oauth_error'), 'neg', 10000);
        history.replaceState({}, '', window.location.pathname);
      }
    });

    // ── Load existing connections ──────────────────────────────────
    async function loadConnections() {
      let q = db.from('shopify_connections').select('*').order('created_at');
      if (_co?.id) q = q.eq('company_entity_id', _co.id);
      const { data, error } = await q;
      if (error) { setStatus('Failed to load connections: ' + error.message, 'neg'); return; }
      renderConnections(data || []);
    }

    function scopeFieldsFromTest(data) {
      const granted = data.scopes_granted
        || window.SiloShopifyScopes?.normalizeGranted?.(data.scopes) || [];
      const missing = data.scopes_missing
        || window.SiloShopifyScopes?.missingForSync?.(granted) || [];
      return {
        scopes_granted: granted,
        scopes_missing: missing,
        scopes_checked_at: data.scopes_checked_at || new Date().toISOString(),
      };
    }

    let _backfillBusy = false;
    const _locMapperCache = new Map();

    function slugifyLoc(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '_')
        .replace(/^_+|_+$/g, '') || 'unknown';
    }

    function shopifyIdKeys(id) {
      const raw = String(id || '');
      return [raw, `gid://shopify/Location/${raw}`];
    }

    function mappingForShopifyId(mappings, shopifyId) {
      const raw = String(shopifyId || '');
      return (mappings || []).find((m) => String(m.shopify_location_id) === raw) || null;
    }

    const UI_CHUNK_DAYS = 7;

    async function syncRun(body) {
      const session = (await db.auth.getSession()).data.session;
      const res = await fetch(`${FUNCTIONS_URL}/shopify-sync-run`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`,
          'apikey': SUPABASE_ANON_KEY,
        },
        body: JSON.stringify(body),
      });
      let data = {};
      try { data = await res.json(); } catch { /* non-JSON (e.g. 546) */ }
      if (!res.ok || data.ok === false) {
        if (res.status === 546) {
          throw new Error(
            'Chunk hit the edge CPU limit (546). Progress is saved — click Resume to continue.',
          );
        }
        throw new Error(data.error || `Sync request failed (${res.status})`);
      }
      return data;
    }

    function lastImportHtml(row) {
      const bf = row?.meta?.history_backfill;
      if (!bf) return '<span class="int-sync-status">—</span>';
      if (bf.status === 'running') {
        const pct = bf.windows_total ? Math.round((Number(bf.windows_done||0)/Number(bf.windows_total))*100) : 0;
        return `<span class="int-sync-status int-sync-status--running">${bf.windows_done||0}/${bf.windows_total||'?'} win</span>`;
      }
      if (bf.status === 'complete') {
        return `<span class="int-sync-status int-sync-status--ok">✓ ${(bf.sales_rows_total||0).toLocaleString()} rows · ${bf.target_days||'?'}d</span>`;
      }
      return '<span class="int-sync-status">—</span>';
    }

    function progressRowHtml(row) {
      const bf = row?.meta?.history_backfill;
      if (!bf || bf.status !== 'running') return '';
      const pct = bf.windows_total ? Math.round((Number(bf.windows_done||0)/Number(bf.windows_total))*100) : 0;
      return `<tr class="int-progress-tr" id="bf-progress-tr-${row.id}">
        <td colspan="8">
          <div class="int-progress active" id="bf-progress-${row.id}">
            <div>${bf.windows_done||0}/${bf.windows_total||'?'} windows · ${bf.orders_total||0} orders · ${bf.sales_rows_total||0} rows</div>
            <div class="int-progress-bar"><span style="width:${pct}%"></span></div>
          </div>
        </td>
      </tr>`;
    }

    function syncPanelHtml(row) {
      // unused in table layout — kept for compat, returns empty
      return '';
    }

    function scopeWarningHtml(row) {
      const missing = Array.isArray(row?.scopes_missing) ? row.scopes_missing : [];
      const granted = Array.isArray(row?.scopes_granted) ? row.scopes_granted : [];
      const fetchErr = row?.meta?.scopes_fetch_error;

      if (fetchErr) {
        return `<div class="int-scope-warn" style="margin:10px 16px 0;">Could not read scopes from Shopify. Re-test after updating the connection.</div>`;
      }
      if (!missing?.length) return '';
      if (!granted?.length && missing.length >= 4) {
        return `<div class="int-scope-warn" style="margin:10px 16px 0;">Scope check returned empty — click Re-test. If this persists, reinstall the custom app token in Shopify.</div>`;
      }
      const labels = window.SiloShopifyScopes?.formatScopeList?.(missing) || missing.join(', ');
      return `<div class="int-scope-warn" style="margin:10px 16px 0;">Missing scopes: ${escHtml(labels)}. Update your Shopify app, then Re-test.</div>`;
    }

    function renderConnections(rows) {
      const tbody = document.getElementById('shopify-connections-list');
      const empty = document.getElementById('shopify-empty');

      // Remove all previous store rows
      tbody.querySelectorAll('.int-store-tr, .int-progress-tr, .int-loc-tr, .int-scope-tr').forEach(el => el.remove());

      if (!rows.length) {
        empty.closest('tr').style.display = '';
        return;
      }
      empty.closest('tr').style.display = 'none';

      const frag = document.createDocumentFragment();

      rows.forEach(row => {
        const missing = Array.isArray(row.scopes_missing) ? row.scopes_missing : [];
        const canSync = !missing.length && row.last_test_status === 'ok';
        const syncOn = !!row.sync_enabled;
        const bf = row?.meta?.history_backfill;
        const bfRunning = bf?.status === 'running';
        const testedOk = row.last_test_status === 'ok';

        const dotClass = row.last_test_status === 'ok' ? 'int-dot int-dot--ok'
          : row.last_test_status === 'error' ? 'int-dot int-dot--err' : 'int-dot';

        // Main store row
        const tr = document.createElement('tr');
        tr.className = 'int-store-tr';
        tr.dataset.id = row.id;
        tr.innerHTML = `
          <td><span class="${dotClass}"></span></td>
          <td>
            <div class="int-store-name">${row.shop_name ? escHtml(row.shop_name) : escHtml(row.shop_domain)}</div>
            <div class="int-store-domain">${escHtml(row.shop_domain)}</div>
          </td>
          <td>
            ${testedOk ? `<label class="int-nightly-toggle">
              <input type="checkbox" ${syncOn ? 'checked' : ''} onchange="toggleSyncEnabled('${row.id}', this.checked)" />
              <span class="int-nightly-badge ${syncOn ? 'int-nightly-badge--on' : 'int-nightly-badge--off'}">${syncOn ? 'ON' : 'OFF'}</span>
            </label>` : '—'}
          </td>
          <td>
            ${canSync ? `<div class="int-btn-group">
              <button class="int-btn int-btn--ghost" ${bfRunning?'disabled':''} onclick="startHistoryBackfill('${row.id}',90)">90d</button>
              <button class="int-btn int-btn--ghost" ${bfRunning?'disabled':''} onclick="startHistoryBackfill('${row.id}',365)">365d</button>
              <button class="int-btn int-btn--ghost" ${bfRunning?'disabled':''} onclick="startHistoryBackfill('${row.id}',730)">730d</button>
              ${bfRunning ? `<button class="int-btn int-btn--warn" onclick="resumeHistoryBackfill('${row.id}')">Resume</button>
              <button class="int-btn int-btn--danger" onclick="cancelHistoryBackfill('${row.id}')">Cancel</button>` : ''}
            </div>` : '—'}
          </td>
          <td>
            ${canSync ? `<button class="int-btn int-btn--ghost" onclick="runInventorySync('${row.id}')">Sync now</button>` : '—'}
          </td>
          <td>
            ${testedOk ? `<button class="int-btn int-btn--ghost" onclick="toggleLocationMapper('${row.id}')">Map locations</button>` : '—'}
          </td>
          <td>${lastImportHtml(row)}</td>
          <td>
            <div class="int-btn-group">
              <button class="int-btn int-btn--ghost" onclick="retest('${row.id}')">Re-test</button>
              <button class="int-btn int-btn--danger" onclick="removeConnection('${row.id}')">Remove</button>
            </div>
          </td>`;
        frag.appendChild(tr);

        // Scope warning row
        const scopeWarn = scopeWarningHtml(row);
        if (scopeWarn) {
          const warnTr = document.createElement('tr');
          warnTr.className = 'int-scope-tr';
          warnTr.innerHTML = `<td colspan="8" style="padding:0 12px 8px;">${scopeWarn}</td>`;
          frag.appendChild(warnTr);
        }

        // Progress row (if running)
        if (bfRunning) {
          const pct = bf.windows_total ? Math.round((Number(bf.windows_done||0)/Number(bf.windows_total))*100) : 0;
          const progTr = document.createElement('tr');
          progTr.className = 'int-progress-tr';
          progTr.id = `bf-progress-tr-${row.id}`;
          progTr.innerHTML = `<td colspan="8" style="padding:0 12px 10px;">
            <div class="int-progress active" id="bf-progress-${row.id}">
              <div>${bf.windows_done||0}/${bf.windows_total||'?'} windows · ${bf.orders_total||0} orders · ${bf.sales_rows_total||0} rows</div>
              <div class="int-progress-bar"><span style="width:${pct}%"></span></div>
            </div></td>`;
          frag.appendChild(progTr);
        }

        // Location mapper row
        const locTr = document.createElement('tr');
        locTr.className = 'int-loc-tr';
        locTr.id = `loc-tr-${row.id}`;
        locTr.innerHTML = `<td colspan="8"><div class="int-loc-panel" id="loc-panel-${row.id}" hidden></div></td>`;
        frag.appendChild(locTr);
      });

      tbody.appendChild(frag);
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Add form toggle ────────────────────────────────────────────
    document.getElementById('btn-add-shopify').addEventListener('click', () => {
      document.getElementById('shopify-add-form').classList.add('open');
      document.getElementById('btn-add-shopify').style.display = 'none';
      document.getElementById('test-result').className = 'test-result';
      document.getElementById('shop-domain').focus();
    });
    document.getElementById('btn-add-shopify').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') e.target.click();
    });

    document.getElementById('btn-cancel-add').addEventListener('click', closeAddForm);

    function closeAddForm() {
      document.getElementById('shopify-add-form').classList.remove('open');
      document.getElementById('btn-add-shopify').style.display = '';
      document.getElementById('shop-domain').value = '';
      document.getElementById('test-result').className = 'test-result';
    }

    // ── Connect with Shopify (OAuth) ───────────────────────────────
    document.getElementById('btn-connect-shopify').addEventListener('click', async () => {
      const domain = document.getElementById('shop-domain').value.trim();
      const resultEl = document.getElementById('test-result');
      const btn = document.getElementById('btn-connect-shopify');

      if (!domain) {
        resultEl.className = 'test-result err';
        resultEl.textContent = 'Enter your shop domain first.';
        return;
      }

      if (!_co?.id) {
        resultEl.className = 'test-result err';
        resultEl.textContent = 'No active company — refresh and try again.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Redirecting…';
      resultEl.className = 'test-result';

      try {
        const session = (await db.auth.getSession()).data.session;
        const res = await fetch(`${FUNCTIONS_URL}/shopify-oauth-start`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${session.access_token}`,
            'apikey': SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({ shop_domain: domain, company_entity_id: _co.id }),
        });
        const data = await res.json();
        if (!res.ok || !data.url) {
          throw new Error(data.error || 'Failed to start OAuth');
        }
        window.location.href = data.url;
      } catch (err) {
        resultEl.className = 'test-result err';
        resultEl.textContent = 'Error: ' + err.message;
        btn.disabled = false;
        btn.textContent = 'Connect with Shopify →';
      }
    });

    // ── Re-test existing connection ────────────────────────────────
    async function retest(id) {
      const { data: conn, error } = await db
        .from('shopify_connections')
        .select('shop_domain, access_token')
        .eq('id', id)
        .single();
      if (error || !conn) { setStatus('Could not load connection', 'neg', 4000); return; }

      setStatus('Testing connection…', 'info');

      try {
        const session = (await db.auth.getSession()).data.session;
        const res = await fetch(`${SUPABASE_URL.replace('/rest/v1','')}/functions/v1/test-shopify-connection`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${session.access_token}`,
            'apikey': SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({ shop_domain: conn.shop_domain, access_token: conn.access_token }),
        });
        const data = await res.json();

        const scopeFields = data.ok ? scopeFieldsFromTest(data) : {};
        const update = data.ok
          ? {
              last_tested_at: new Date().toISOString(),
              last_test_status: 'ok',
              last_test_success: true,
              shop_name: data.shop?.name,
              shop_currency: data.shop?.currency,
              ...scopeFields,
              meta: data.scopes_error
                ? { scopes_fetch_error: String(data.scopes_error).slice(0, 500) }
                : { scopes_fetch_error: null },
            }
          : {
              last_tested_at: new Date().toISOString(),
              last_test_status: 'error',
              last_test_success: false,
              last_test_error: (data.error || 'Unknown').slice(0, 500),
            };

        const { error: saveErr } = await db.from('shopify_connections').update(update).eq('id', id);
        if (saveErr) {
          setStatus('Test ran but failed to save: ' + saveErr.message, 'neg', 5000);
          return;
        }

        if (data.ok) {
          const missing = scopeFields.scopes_missing || [];
          if (missing.length) {
            setStatus('✓ Connection OK — missing sync scopes: ' + window.SiloShopifyScopes.formatScopeList(missing), 'info', 6000);
          } else {
            setStatus('✓ Connection OK — all sync scopes granted', 'pos', 4000);
          }
        } else {
          setStatus('✗ Connection failed: ' + (data.error || ''), 'neg', 4000);
        }
        loadConnections();
      } catch (err) {
        setStatus('Request failed: ' + err.message, 'neg', 5000);
      }
    }

    function updateBackfillProgress(connectionId, progress) {
      let el = document.getElementById(`bf-progress-${connectionId}`);
      const tbody = document.getElementById('shopify-connections-list');

      // Create progress row if it doesn't exist yet
      if (!el) {
        const locTr = document.getElementById(`loc-tr-${connectionId}`);
        if (locTr) {
          const progTr = document.createElement('tr');
          progTr.className = 'int-progress-tr';
          progTr.id = `bf-progress-tr-${connectionId}`;
          progTr.innerHTML = `<td colspan="8" style="padding:0 12px 10px;">
            <div class="int-progress active" id="bf-progress-${connectionId}"></div></td>`;
          locTr.before(progTr);
          el = document.getElementById(`bf-progress-${connectionId}`);
        }
      }
      if (!el || !progress) return;
      const pct = progress.windows_total
        ? Math.min(100, Math.round((Number(progress.windows_done || 0) / Number(progress.windows_total)) * 100))
        : 0;
      el.classList.add('active');
      el.innerHTML = `
        <div>${progress.windows_done || 0}/${progress.windows_total || '?'} windows
          · ${progress.orders_total || 0} orders · ${progress.sales_rows_total || 0} rows</div>
        <div class="int-progress-bar"><span style="width:${pct}%"></span></div>`;
    }

    async function runHistoryChunkLoop(connectionId, firstResponse) {
      let res = firstResponse;
      updateBackfillProgress(connectionId, res.progress);
      while (res.continue) {
        await new Promise((r) => setTimeout(r, 200));
        res = await syncRun({
          action: 'history_chunk',
          connection_id: connectionId,
          job_id: res.job_id,
          chunk_days: UI_CHUNK_DAYS,
        });
        updateBackfillProgress(connectionId, res.progress);
      }
      return res;
    }

    async function startHistoryBackfill(connectionId, historyDays) {
      if (_backfillBusy) return;
      if (!confirm(`Import ${historyDays} days of sales from Shopify? This runs in the background in your browser — keep this tab open until complete.`)) return;

      _backfillBusy = true;
      setStatus(`Starting ${historyDays}-day sales import…`, 'info');

      try {
        const res = await syncRun({
          action: 'start_history_backfill',
          connection_id: connectionId,
          history_days: historyDays,
          chunk_days: UI_CHUNK_DAYS,
        });
        const final = await runHistoryChunkLoop(connectionId, res);
        setStatus(
          `✓ Sales import complete — ${final.progress?.sales_rows_total || 0} rows from ${final.progress?.orders_total || 0} orders`,
          'pos',
          8000,
        );
        loadConnections();
      } catch (err) {
        setStatus(
          err.message.includes('546') || err.message.includes('CPU limit')
            ? err.message
            : 'Import failed: ' + err.message,
          err.message.includes('546') || err.message.includes('CPU limit') ? 'info' : 'neg',
          12000,
        );
        loadConnections();
      } finally {
        _backfillBusy = false;
      }
    }

    async function resumeHistoryBackfill(connectionId) {
      if (_backfillBusy) return;
      _backfillBusy = true;
      setStatus('Resuming sales import…', 'info');
      try {
        const res = await syncRun({
          action: 'history_chunk',
          connection_id: connectionId,
          chunk_days: UI_CHUNK_DAYS,
        });
        const final = await runHistoryChunkLoop(connectionId, res);
        setStatus(
          `✓ Sales import complete — ${final.progress?.sales_rows_total || 0} rows`,
          'pos',
          8000,
        );
        loadConnections();
      } catch (err) {
        setStatus(
          err.message.includes('546') || err.message.includes('CPU limit')
            ? err.message
            : 'Resume failed: ' + err.message,
          err.message.includes('546') || err.message.includes('CPU limit') ? 'info' : 'neg',
          12000,
        );
      } finally {
        _backfillBusy = false;
      }
    }

    async function cancelHistoryBackfill(connectionId) {
      if (!confirm('Cancel the in-progress sales import?')) return;
      try {
        await syncRun({ action: 'cancel_history_backfill', connection_id: connectionId });
        setStatus('Import cancelled', 'info', 4000);
        loadConnections();
      } catch (err) {
        setStatus('Cancel failed: ' + err.message, 'neg', 5000);
      }
    }

    async function runInventorySync(connectionId) {
      setStatus('Syncing inventory…', 'info');
      try {
        const res = await syncRun({ action: 'inventory_snapshot', connection_id: connectionId });
        setStatus(
          `✓ Inventory synced — ${res.result?.inventory_rows_upserted || 0} rows`,
          'pos',
          6000,
        );
        loadConnections();
      } catch (err) {
        setStatus('Inventory sync failed: ' + err.message, 'neg', 6000);
      }
    }

    async function toggleSyncEnabled(connectionId, enabled) {
      const { error } = await db
        .from('shopify_connections')
        .update({ sync_enabled: enabled })
        .eq('id', connectionId);
      if (error) {
        setStatus('Failed to update sync setting: ' + error.message, 'neg', 5000);
        loadConnections();
        return;
      }
      setStatus(enabled ? 'API sync enabled for nightly job' : 'API sync disabled', 'info', 3000);
      loadConnections();
    }

    const STORE_TYPES = ['online', 'retail', 'outlet', 'pop_up', 'warehouse', 'wholesale'];

    function locationMapperRowHtml(connectionId, shopLoc, siloLocs, existingMappings, shopDomain) {
      const mapping = mappingForShopifyId(existingMappings, shopLoc.id);
      const mappedSiloLoc = mapping ? (siloLocs || []).find((l) => String(l.id) === String(mapping.location_id)) : null;
      const rowId = `loc-row-${connectionId}-${shopLoc.id}`;
      const selectId = `loc-select-${connectionId}-${shopLoc.id}`;
      const fieldsId = `loc-fields-${connectionId}-${shopLoc.id}`;
      const defaultCode = slugifyLoc(shopLoc.name);
      const prefixedCode = defaultCode;

      const options = ['<option value="">— Unmapped —</option>'];
      for (const loc of siloLocs) {
        const selected = mapping && String(loc.id) === String(mapping.location_id) ? ' selected' : '';
        options.push(`<option value="${loc.id}"${selected}>${escHtml(loc.location_name)} (${escHtml(loc.location_code)})</option>`);
      }
      options.push('<option value="__new__">+ Create new SILO location</option>');

      const storeTypeOpts = STORE_TYPES.map((t) =>
        `<option value="${t}"${t === 'retail' ? ' selected' : ''}>${t}</option>`,
      ).join('');

      const displayCode = mappedSiloLoc?.location_code || mapping?.silo_location_code;
      const mappedBadge = displayCode
        ? `<div class="int-loc-mapped">→ ${escHtml(displayCode)}</div>`
        : `<div class="int-loc-unmapped">Uses fallback tag until mapped</div>`;

      return `<tr id="${rowId}">
        <td>
          <div class="int-loc-shopify-name">${escHtml(shopLoc.name)}</div>
          <div class="int-loc-shopify-meta">Shopify #${escHtml(shopLoc.id)}${shopLoc.city ? ` · ${escHtml(shopLoc.city)}` : ''}</div>
          ${mappedBadge}
        </td>
        <td>
          <select class="bcn-field" id="${selectId}" style="width:100%;font-size:11px;height:28px;"
            onchange="onLocationMapModeChange('${connectionId}', '${shopLoc.id}')">
            ${options.join('')}
          </select>
          <div class="int-loc-fields" id="${fieldsId}" hidden>
            <input class="bcn-field bcn-field--mono" type="text" placeholder="Location code (e.g. chicago)"
              value="" data-field="existing-code" style="margin-top:4px;" />
            <div style="font-size:10px;color:var(--bcn-ink-3);margin-bottom:4px;">Rename the SILO location code (affects all sales tags)</div>
            <input class="bcn-field" type="text" placeholder="Location name"
              value="${escHtml(shopLoc.name)}" data-field="name" />
            <input class="bcn-field bcn-field--mono" type="text" placeholder="Location code"
              value="${escHtml(prefixedCode)}" data-field="code" />
            <select class="bcn-field" data-field="store_type">${storeTypeOpts}</select>
            <input class="bcn-field bcn-field--mono" type="text" placeholder="Domain (optional)"
              value="${escHtml(shopDomain || '')}" data-field="domain" />
          </div>
        </td>
        <td style="white-space:nowrap;">
          <button class="bcn-btn bcn-btn--primary" style="font-size:11px;height:26px;padding:0 8px;"
            onclick="saveLocationMapping('${connectionId}', '${shopLoc.id}')">Save</button>
          ${mapping ? `<button class="bcn-btn bcn-btn--ghost" style="font-size:11px;height:26px;padding:0 8px;margin-top:4px;"
            onclick="clearLocationMapping('${connectionId}', '${shopLoc.id}')">Clear</button>` : ''}
        </td>
      </tr>`;
    }

    function renderLocationMapper(connectionId, cache) {
      const panel = document.getElementById(`loc-panel-${connectionId}`);
      if (!panel) return;

      const { shopifyLocations, siloLocations, existingMappings, shopDomain } = cache;
      const mappedCount = (shopifyLocations || []).filter((s) => mappingForShopifyId(existingMappings, s.id)).length;
      const total = (shopifyLocations || []).length;

      panel.innerHTML = `
        <div class="int-loc-head">
          <div class="int-loc-summary">${mappedCount} of ${total} Shopify locations mapped to SILO</div>
          <button class="bcn-btn bcn-btn--ghost" style="font-size:11px;height:26px;padding:0 8px;"
            onclick="refreshLocationMapper('${connectionId}')">Refresh</button>
        </div>
        ${mappedCount < total ? `<div class="int-scope-warn" style="margin-bottom:8px;">
          Unmapped locations import as <code>{shop}_{name}</code> tags (e.g. baseballismdsg_unknown).
          Map them here, then re-run a sales import to update existing rows.
        </div>` : `<div class="int-scope-warn" style="margin-bottom:8px;background:#f0fdf4;border-color:#bbf7d0;color:#166534;">
          All locations mapped. Re-run sales import if you changed mappings on existing data.
        </div>`}
        <table class="int-loc-table">
          <thead>
            <tr>
              <th>Shopify</th>
              <th>SILO location</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${(shopifyLocations || []).map((s) => locationMapperRowHtml(connectionId, s, siloLocations, existingMappings, shopDomain)).join('')}
          </tbody>
        </table>`;

      for (const s of shopifyLocations || []) {
        onLocationMapModeChange(connectionId, s.id);
      }
    }

    function onLocationMapModeChange(connectionId, shopifyLocId) {
      const select = document.getElementById(`loc-select-${connectionId}-${shopifyLocId}`);
      const fields = document.getElementById(`loc-fields-${connectionId}-${shopifyLocId}`);
      if (!select || !fields) return;
      const mode = select.value;
      fields.hidden = !mode || mode === '';

      const existingCodeWrap = fields.querySelector('[data-field="existing-code"]');
      const existingCodeHint = existingCodeWrap?.nextElementSibling;
      const newFields = fields.querySelectorAll('[data-field="name"],[data-field="code"],[data-field="store_type"],[data-field="domain"]');

      if (mode === '__new__') {
        if (existingCodeWrap) existingCodeWrap.hidden = true;
        if (existingCodeHint) existingCodeHint.hidden = true;
        newFields.forEach((el) => el.hidden = false);
      } else if (mode) {
        // Existing SILO location — show code rename field, pre-fill with current code
        const cache = _locMapperCache.get(connectionId);
        const siloLoc = (cache?.siloLocations || []).find((l) => String(l.id) === mode);
        if (existingCodeWrap) {
          existingCodeWrap.hidden = false;
          existingCodeWrap.value = siloLoc?.location_code || '';
          existingCodeWrap.placeholder = `Location code (e.g. chicago)`;
        }
        if (existingCodeHint) existingCodeHint.hidden = false;
        newFields.forEach((el) => el.hidden = true);
      }
    }

    async function loadSiloLocations() {
      let q = db
        .from('locations')
        .select('id, location_code, location_name, domain, store_type, shopify_location_id')
        .order('location_name');
      if (_co?.id) q = q.eq('company_entity_id', _co.id);
      const { data, error } = await q;
      if (error) throw new Error(error.message);
      return data || [];
    }

    async function loadLocationMapperData(connectionId) {
      const { data: conn, error: connErr } = await db
        .from('shopify_connections')
        .select('shop_domain')
        .eq('id', connectionId)
        .single();
      if (connErr || !conn) throw new Error('Connection not found');

      const [syncRes, siloLocations, existingMappings] = await Promise.all([
        syncRun({ action: 'list_shopify_locations', connection_id: connectionId }),
        loadSiloLocations(),
        loadConnectionMappings(connectionId),
      ]);

      return {
        shopifyLocations: syncRes.locations || [],
        siloLocations,
        existingMappings,
        shopDomain: conn.shop_domain,
      };
    }

    async function loadConnectionMappings(connectionId) {
      const { data, error } = await db
        .from('shopify_location_mappings')
        .select('shopify_location_id, location_id, silo_location_code, shopify_location_name')
        .eq('connection_id', connectionId);
      if (error) throw new Error(error.message);
      return data || [];
    }

    async function refreshLocationMapper(connectionId) {
      const panel = document.getElementById(`loc-panel-${connectionId}`);
      if (panel) {
        panel.innerHTML = '<div class="int-loc-summary">Loading Shopify locations…</div>';
      }
      try {
        const cache = await loadLocationMapperData(connectionId);
        _locMapperCache.set(connectionId, cache);
        renderLocationMapper(connectionId, cache);
      } catch (err) {
        if (panel) {
          panel.innerHTML = `<div class="int-scope-warn">Failed to load locations: ${escHtml(err.message)}</div>`;
        }
      }
    }

    async function toggleLocationMapper(connectionId) {
      const panel = document.getElementById(`loc-panel-${connectionId}`);
      if (!panel) return;

      const isHidden = panel.hasAttribute('hidden');
      if (!isHidden) {
        panel.setAttribute('hidden', '');
        return;
      }

      panel.removeAttribute('hidden');
      await refreshLocationMapper(connectionId);
    }

    async function saveLocationMapping(connectionId, shopifyLocId) {
      const select = document.getElementById(`loc-select-${connectionId}-${shopifyLocId}`);
      const fields = document.getElementById(`loc-fields-${connectionId}-${shopifyLocId}`);
      if (!select) return;

      const mode = select.value;
      if (!mode) {
        setStatus('Choose a SILO location or create new', 'info', 3000);
        return;
      }

      setStatus('Saving location mapping…', 'info');

      const cache = _locMapperCache.get(connectionId);
      const shopLocData = (cache?.shopifyLocations || []).find((l) => String(l.id) === String(shopifyLocId));

      try {
        let locationId, locationCode;

        if (mode === '__new__') {
          const name = fields?.querySelector('[data-field="name"]')?.value?.trim();
          const code = fields?.querySelector('[data-field="code"]')?.value?.trim();
          const storeType = fields?.querySelector('[data-field="store_type"]')?.value || 'retail';
          const domain = fields?.querySelector('[data-field="domain"]')?.value?.trim() || null;

          if (!name || !code) {
            setStatus('Location name and code are required', 'neg', 4000);
            return;
          }

          const { data: nextId, error: idErr } = await db.rpc('next_location_id');
          if (idErr) throw new Error(idErr.message);
          if (!nextId) throw new Error('Could not allocate location id');

          const { error: insErr } = await db.from('locations').insert({
            id: Number(nextId),
            company_entity_id: _co?.id,
            location_code: code,
            location_name: name,
            domain,
            store_type: storeType,
            is_active: true,
            created_by: _session?.user?.id,
            updated_by: _session?.user?.id,
          });
          if (insErr) throw new Error(insErr.message);

          locationId = Number(nextId);
          locationCode = code;
        } else {
          locationId = Number(mode);
          const existingCode = fields?.querySelector('[data-field="existing-code"]')?.value?.trim();
          const currentCode = (cache?.siloLocations || []).find((l) => String(l.id) === mode)?.location_code || null;
          locationCode = existingCode || currentCode;

          // Rename location code if changed
          if (existingCode && existingCode !== currentCode) {
            const { error: renameErr } = await db
              .from('locations')
              .update({ location_code: existingCode, updated_by: _session?.user?.id })
              .eq('id', locationId);
            if (renameErr) throw new Error(`Rename failed: ${renameErr.message}`);
          }
        }

        const { error: upsertErr } = await db
          .from('shopify_location_mappings')
          .upsert({
            connection_id: connectionId,
            company_entity_id: _co?.id,
            shopify_location_id: String(shopifyLocId),
            shopify_location_name: shopLocData?.name || null,
            location_id: locationId,
            silo_location_code: locationCode,
          }, { onConflict: 'connection_id,shopify_location_id' });
        if (upsertErr) throw new Error(upsertErr.message);

        setStatus('✓ Location mapped — re-run sales import to update existing row tags', 'pos', 8000);
        await refreshLocationMapper(connectionId);
      } catch (err) {
        setStatus('Save failed: ' + err.message, 'neg', 6000);
      }
    }

    async function clearLocationMapping(connectionId, shopifyLocId) {
      if (!confirm('Remove Shopify mapping from this SILO location?')) return;
      setStatus('Clearing mapping…', 'info');
      try {
        const { error } = await db
          .from('shopify_location_mappings')
          .delete()
          .eq('connection_id', connectionId)
          .eq('shopify_location_id', String(shopifyLocId));
        if (error) throw new Error(error.message);
        setStatus('Mapping cleared', 'info', 4000);
        await refreshLocationMapper(connectionId);
      } catch (err) {
        setStatus('Clear failed: ' + err.message, 'neg', 5000);
      }
    }

    // ── Remove connection ──────────────────────────────────────────
    async function removeConnection(id) {
      if (!confirm('Remove this Shopify connection? This cannot be undone.')) return;
      const { error } = await db.from('shopify_connections').delete().eq('id', id);
      if (error) { setStatus('Delete failed: ' + error.message, 'neg'); return; }
      loadConnections();
    }
  </script>
