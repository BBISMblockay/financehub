<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SILO · Products</title>
  <script>
    // Product Tracker was consolidated into /v2/products.html (Samples tab).
    // Deep-link params (?sample=…, ?item=…, ?tab=…) pass through untouched.
    const p = new URLSearchParams(location.search);
    if (!p.has('tab') && !p.has('item') && !p.has('sample')) p.set('tab', 'samples');
    location.replace('/v2/products.html' + (p.toString() ? '?' + p.toString() : ''));
  </script>
</head>
<body></body>
</html>
