<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SILO · Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="beacon.css" />
  <link rel="stylesheet" href="silo-brand.css" />
  <script src="../pages/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
  <style>
    /* ── Task Manager (tm-) component styles ─────────────────────────── */

    /* overlay + drawer */
    .tm-overlay {
      position: fixed; inset: 0;
      background: rgba(10, 16, 30, .46);
      z-index: 90; opacity: 0; pointer-events: none;
      transition: opacity .18s ease;
    }
    .tm-overlay.open { opacity: 1; pointer-events: auto; }

    .tm-drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(480px, 100vw);
      background: var(--bcn-surface);
      border-left: 1px solid var(--bcn-border-strong);
      z-index: 91; display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .2s ease;
      box-shadow: -6px 0 32px rgba(0, 0, 0, .14);
    }
    .tm-drawer.open { transform: translateX(0); }

    .tm-drawer-head {
      background: var(--bcn-band);
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      flex-shrink: 0; display: flex; align-items: center; gap: 10px;
    }
    .tm-drawer-label {
      font-size: 10px; font-weight: 700; letter-spacing: .1em;
      color: rgba(255,255,255,.45); font-family: var(--bcn-mono);
    }
    .tm-drawer-title {
      flex: 1; font-size: 13px; font-weight: 600;
      color: rgba(255, 255, 255, .85); font-family: var(--bcn-mono);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tm-drawer-close {
      width: 28px; height: 28px; padding: 0; flex-shrink: 0;
      background: rgba(255, 255, 255, .1); color: rgba(255, 255, 255, .65);
      border: 1px solid rgba(255, 255, 255, .14); border-radius: 6px;
      font-size: 14px; cursor: pointer; line-height: 1;
    }
    .tm-drawer-close:hover { background: rgba(255, 255, 255, .2); color: #fff; }

    .tm-drawer-body {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .tm-drawer-body::-webkit-scrollbar { width: 5px; }
    .tm-drawer-body::-webkit-scrollbar-thumb { background: var(--bcn-border-strong); border-radius: 3px; }

    .tm-drawer-foot {
      padding: 12px 16px; border-top: 1px solid var(--bcn-border);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .tm-drawer-foot-spacer { flex: 1; }

    /* table due-date coloring */
    .tm-due--overdue { color: var(--bcn-neg); font-weight: 700; }
    .tm-due--soon    { color: var(--bcn-warn); font-weight: 600; }

    /* row highlight */
    .tm-row--overdue td { background: oklch(0.55 0.2 25 / 0.04) !important; }
    .tm-row--soon    td { background: oklch(0.75 0.18 75 / 0.05) !important; }

    /* inline status select */
    .tm-status-sel {
      height: 26px; padding: 0 6px;
      border: 1px solid var(--bcn-border); border-radius: 5px;
      background: var(--bcn-surface); color: var(--bcn-ink);
      font-family: var(--bcn-mono); font-size: 11px;
      cursor: pointer;
    }
    .tm-status-sel:focus { outline: none; border-color: var(--bcn-accent); }

    /* action button in table */
    .tm-btn-edit {
      height: 26px; padding: 0 10px;
      font-size: 11px; font-weight: 700; font-family: var(--bcn-mono);
      border: 1px solid var(--bcn-border); border-radius: 5px;
      background: none; color: var(--bcn-ink-2); cursor: pointer;
    }
    .tm-btn-edit:hover { border-color: var(--bcn-accent); color: var(--bcn-accent); }

    /* empty state */
    .tm-empty {
      padding: 48px 0; text-align: center;
      color: var(--bcn-ink-3); font-size: 13px;
      font-family: var(--bcn-mono);
    }

    /* two-column field rows in drawer */
    .tm-field-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
  </style>
  <link rel="stylesheet" href="beacon-mirrors-unified.css" />
  <link rel="stylesheet" href="v2-mobile.css" />
  <script src="v2-shell.js" defer></script>
</head>
<body class="silo-brand">

<div class="silo-app" id="silo-app">
  <main class="silo-main">

    <!-- Header -->
    <header class="bcn-header">
      <div style="flex:1;min-width:0;">
        <div class="bcn-header-title">
          <h1>Task Manager</h1>
        </div>
        <div class="bcn-header-sub">All launch tasks across SILO</div>
      </div>
      <div class="bcn-header-actions">
        <button class="bcn-btn bcn-btn--primary" id="btnNew">+ New Task</button>
      </div>
    </header>

    <!-- Status bar -->
    <div class="bcn-status" id="status" hidden></div>

    <!-- KPI Band -->
    <section class="bcn-kpi-band" id="kpiBand">
      <div class="bcn-kpi">
        <div class="bcn-kpi-label">Total Open</div>
        <div class="bcn-kpi-value bcn-mono" id="kpiOpen">—</div>
      </div>
      <div class="bcn-kpi">
        <div class="bcn-kpi-label">Overdue</div>
        <div class="bcn-kpi-value bcn-mono" id="kpiOverdue">—</div>
      </div>
      <div class="bcn-kpi">
        <div class="bcn-kpi-label">Due This Week</div>
        <div class="bcn-kpi-value bcn-mono" id="kpiWeek">—</div>
      </div>
      <div class="bcn-kpi">
        <div class="bcn-kpi-label">My Tasks</div>
        <div class="bcn-kpi-value bcn-mono" id="kpiMine">—</div>
      </div>
      <div class="bcn-kpi">
        <div class="bcn-kpi-label">No Assignee</div>
        <div class="bcn-kpi-value bcn-mono" id="kpiUnassigned">—</div>
      </div>
    </section>

    <!-- Filter bar -->
    <section class="bcn-filter-bar">
      <div class="bcn-filter">
        <input class="bcn-field" type="text" id="fSearch" placeholder="Search tasks…" style="min-width:200px;" />
      </div>
      <div class="bcn-filter">
        <select class="bcn-field" id="fLaunch">
          <option value="">All launches</option>
        </select>
      </div>
      <div class="bcn-filter">
        <select class="bcn-field" id="fAssignee">
          <option value="">All assignees</option>
          <option value="__me__">Me</option>
          <option value="__none__">Unassigned</option>
        </select>
      </div>
      <div class="bcn-filter">
        <select class="bcn-field" id="fPriority">
          <option value="">All priorities</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="normal">Normal</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="bcn-filter">
        <select class="bcn-field" id="fStatus">
          <option value="open-inprogress" selected>Open &amp; In Progress</option>
          <option value="">All statuses</option>
          <option value="open">Open</option>
          <option value="in-progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="bcn-filter">
        <select class="bcn-field" id="fType">
          <option value="">All types</option>
        </select>
      </div>
    </section>

    <!-- Tasks table -->
    <div class="bcn-card" style="margin-top:16px;">
      <div class="bcn-matrix-scroll">
        <div class="bcn-matrix-wrap">
          <table class="bcn-table" id="tasksTable">
            <thead>
              <tr>
                <th>Title</th>
                <th>Launch</th>
                <th>Assignee</th>
                <th>Priority</th>
                <th>Type</th>
                <th>Due</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tasksTbody">
              <tr><td colspan="8" class="tm-empty">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- Drawer overlay + panel -->
<div class="tm-overlay" id="tmOverlay"></div>
<div class="tm-drawer" id="tmDrawer" role="dialog" aria-modal="true" aria-label="Task editor">
  <div class="tm-drawer-head">
    <div style="flex:1;min-width:0;">
      <div class="tm-drawer-label">TASK</div>
      <div class="tm-drawer-title" id="drawerTitle">New Task</div>
    </div>
    <button class="tm-drawer-close" id="btnDrawerClose" aria-label="Close">&#x2715;</button>
  </div>
  <div class="tm-drawer-body">
    <input type="hidden" id="dTaskId" />

    <!-- Task title -->
    <div class="bcn-field-group">
      <label class="bcn-label" for="dTitle">Task title <span style="color:var(--bcn-neg)">*</span></label>
      <input class="bcn-field" type="text" id="dTitle" placeholder="Describe the task…" />
    </div>

    <!-- Launch (required) -->
    <div class="bcn-field-group">
      <label class="bcn-label" for="dLaunch">Launch <span style="color:var(--bcn-neg)">*</span></label>
      <select class="bcn-field" id="dLaunch">
        <option value="">Select a launch…</option>
      </select>
    </div>

    <div class="tm-field-row">
      <!-- Assignee -->
      <div class="bcn-field-group">
        <label class="bcn-label" for="dAssignee">Assignee</label>
        <select class="bcn-field" id="dAssignee">
          <option value="">Unassigned</option>
        </select>
      </div>

      <!-- Priority -->
      <div class="bcn-field-group">
        <label class="bcn-label" for="dPriority">Priority</label>
        <select class="bcn-field" id="dPriority">
          <option value="normal">Normal</option>
          <option value="low">Low</option>
          <option value="high">High</option>
          <option value="critical">Critical</option>
        </select>
      </div>
    </div>

    <div class="tm-field-row">
      <!-- Type -->
      <div class="bcn-field-group">
        <label class="bcn-label" for="dType">Type</label>
        <input class="bcn-field" type="text" id="dType" placeholder="e.g. Marketing, Design…" />
      </div>

      <!-- Due date -->
      <div class="bcn-field-group">
        <label class="bcn-label" for="dDueDate">Due date</label>
        <input class="bcn-field bcn-field--mono" type="date" id="dDueDate" />
      </div>
    </div>

    <!-- Status (edit only) -->
    <div class="bcn-field-group" id="dStatusRow" style="display:none;">
      <label class="bcn-label" for="dStatus">Status</label>
      <select class="bcn-field" id="dStatus">
        <option value="open">Open</option>
        <option value="in-progress">In Progress</option>
        <option value="done">Done</option>
      </select>
    </div>

    <!-- Notes -->
    <div class="bcn-field-group">
      <label class="bcn-label" for="dNotes">Notes</label>
      <textarea class="bcn-field" id="dNotes" rows="4" placeholder="Additional context…" style="resize:vertical;"></textarea>
    </div>
  </div>
  <div class="tm-drawer-foot">
    <button class="bcn-btn bcn-btn--danger" id="btnDelete" style="display:none;">Delete</button>
    <div class="tm-drawer-foot-spacer"></div>
    <button class="bcn-btn bcn-btn--ghost" id="btnCancel">Cancel</button>
    <button class="bcn-btn bcn-btn--primary" id="btnSave">Save Task</button>
  </div>
</div>

<script src="silo-chrome.js"></script>
<script>
(async () => {
  /* ── Config + Supabase ─────────────────────────────────────────── */
  const cfg = window.__SILO_CONFIG__ || {};
  const SUPABASE_URL      = cfg.SUPABASE_URL      || '';
  const SUPABASE_ANON_KEY = cfg.SUPABASE_ANON_KEY || '';

  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    setStatus('Missing Supabase config — check pages/config.js', 'neg');
    return;
  }

  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  /* ── Status helper (forward declared so config error can use it) ── */
  function setStatus(msg, type = 'info', ms = 0) {
    const el = document.getElementById('status');
    el.className = `bcn-status bcn-status--${type}`;
    el.textContent = msg;
    el.hidden = false;
    if (ms) setTimeout(() => { el.hidden = true; }, ms);
  }
  function clearStatus() { document.getElementById('status').hidden = true; }

  /* ── Auth check ────────────────────────────────────────────────── */
  const { data: { session } } = await db.auth.getSession();
  if (!session) {
    location.href = '/pages/login.html?next=/v2/tasks.html';
    return;
  }

  const currentUser  = session.user;
  const currentEmail = currentUser.email || '';
  let   currentRole  = 'user';

  /* ── State ─────────────────────────────────────────────────────── */
  let allTasks      = [];
  let allLaunches   = [];
  let allProfiles   = [];
  let filteredTasks = [];

  /* ── Date helpers ──────────────────────────────────────────────── */
  const TODAY = new Date(); TODAY.setHours(0, 0, 0, 0);
  const IN7   = new Date(TODAY); IN7.setDate(IN7.getDate() + 7);
  const IN3   = new Date(TODAY); IN3.setDate(IN3.getDate() + 3);

  function parseDate(s) {
    if (!s) return null;
    const d = new Date(s + 'T00:00:00');
    return isNaN(d) ? null : d;
  }

  function fmtDate(s) {
    const d = parseDate(s);
    if (!d) return '—';
    return (d.getMonth() + 1).toString().padStart(2, '0') + '/' + d.getDate().toString().padStart(2, '0');
  }

  /** Returns 'overdue' | 'soon' | '' */
  function dueCss(dateStr, status) {
    if (status === 'done') return '';
    const d = parseDate(dateStr);
    if (!d) return '';
    if (d < TODAY) return 'overdue';
    if (d <= IN3)  return 'soon';
    return '';
  }

  /* ── Lookup helpers ────────────────────────────────────────────── */
  function launchName(id) {
    if (!id) return '—';
    const l = allLaunches.find(x => x.id === id);
    return l ? l.name : '—';
  }

  function profileName(userId) {
    if (!userId) return '—';
    const p = allProfiles.find(x => x.id === userId);
    return p ? (p.name || p.email) : '—';
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── Load all data in parallel ─────────────────────────────────── */
  async function loadAll() {
    setStatus('Loading…', 'info');
    try {
      const [tasksRes, launchRes, profilesRes, profileMe] = await Promise.all([
        db.from('launch_tasks').select('*').order('created_at', { ascending: false }),
        db.from('launch_calendar').select('id, name, launch_date').order('launch_date', { ascending: false }),
        db.from('profiles').select('id, name, email').eq('is_active', true).order('name'),
        db.from('profiles').select('role').eq('id', currentUser.id).single(),
      ]);

      if (tasksRes.error)    throw tasksRes.error;
      if (launchRes.error)   throw launchRes.error;
      if (profilesRes.error) throw profilesRes.error;

      allTasks    = tasksRes.data    || [];
      allLaunches = launchRes.data   || [];
      allProfiles = profilesRes.data || [];
      if (profileMe.data) currentRole = profileMe.data.role || 'user';

      populateFilterDropdowns();
      renderKpis();
      applyFilters();
      clearStatus();
    } catch (err) {
      setStatus('Failed to load data: ' + err.message, 'neg');
      console.error(err);
    }
  }

  /* ── Populate filter dropdowns ─────────────────────────────────── */
  function populateFilterDropdowns() {
    // filter: launches
    const fLaunch = document.getElementById('fLaunch');
    fLaunch.innerHTML = '<option value="">All launches</option>';
    allLaunches.forEach(l => {
      const o = document.createElement('option');
      o.value = l.id; o.textContent = l.name;
      fLaunch.appendChild(o);
    });

    // filter: assignees
    const fAssignee = document.getElementById('fAssignee');
    fAssignee.innerHTML = '<option value="">All assignees</option><option value="__me__">Me</option><option value="__none__">Unassigned</option>';
    allProfiles.forEach(p => {
      const o = document.createElement('option');
      o.value = p.id; o.textContent = p.name || p.email;
      fAssignee.appendChild(o);
    });

    // filter: task types
    const types = [...new Set(allTasks.map(t => t.task_type).filter(Boolean))].sort();
    const fType = document.getElementById('fType');
    fType.innerHTML = '<option value="">All types</option>';
    types.forEach(ty => {
      const o = document.createElement('option');
      o.value = ty; o.textContent = ty;
      fType.appendChild(o);
    });

    // drawer: launches
    const dLaunch = document.getElementById('dLaunch');
    dLaunch.innerHTML = '<option value="">Select a launch…</option>';
    allLaunches.forEach(l => {
      const o = document.createElement('option');
      o.value = l.id; o.textContent = l.name;
      dLaunch.appendChild(o);
    });

    // drawer: assignees
    const dAssignee = document.getElementById('dAssignee');
    dAssignee.innerHTML = '<option value="">Unassigned</option>';
    allProfiles.forEach(p => {
      const o = document.createElement('option');
      o.value = p.id; o.textContent = p.name || p.email;
      dAssignee.appendChild(o);
    });
  }

  /* ── KPI render ────────────────────────────────────────────────── */
  function renderKpis() {
    const notDone    = allTasks.filter(t => t.status !== 'done');
    const overdue    = notDone.filter(t => { const d = parseDate(t.due_date); return d && d < TODAY; });
    const dueWeek    = notDone.filter(t => { const d = parseDate(t.due_date); return d && d >= TODAY && d <= IN7; });
    const mine       = allTasks.filter(t => t.assigned_to_user_id === currentUser.id);
    const unassigned = notDone.filter(t => !t.assigned_to_user_id);

    document.getElementById('kpiOpen').textContent       = notDone.length;
    document.getElementById('kpiOverdue').textContent    = overdue.length;
    document.getElementById('kpiWeek').textContent       = dueWeek.length;
    document.getElementById('kpiMine').textContent       = mine.length;
    document.getElementById('kpiUnassigned').textContent = unassigned.length;
  }

  /* ── Filter logic ──────────────────────────────────────────────── */
  function applyFilters() {
    const search   = document.getElementById('fSearch').value.trim().toLowerCase();
    const launch   = document.getElementById('fLaunch').value;
    const assignee = document.getElementById('fAssignee').value;
    const priority = document.getElementById('fPriority').value;
    const statusF  = document.getElementById('fStatus').value;
    const typeF    = document.getElementById('fType').value;

    filteredTasks = allTasks.filter(t => {
      if (search) {
        const hay = ((t.task_title || '') + ' ' + (t.notes || '')).toLowerCase();
        if (!hay.includes(search)) return false;
      }
      if (launch && t.launch_id !== launch) return false;
      if (assignee === '__me__'   && t.assigned_to_user_id !== currentUser.id) return false;
      if (assignee === '__none__' && t.assigned_to_user_id)                    return false;
      if (assignee && assignee !== '__me__' && assignee !== '__none__' && t.assigned_to_user_id !== assignee) return false;
      if (priority && t.priority !== priority)   return false;
      if (typeF    && t.task_type !== typeF)      return false;

      if (statusF === 'open-inprogress') {
        if (t.status === 'done') return false;
      } else if (statusF === 'open') {
        if (t.status !== 'open') return false;
      } else if (statusF === 'in-progress') {
        if (t.status !== 'in-progress') return false;
      } else if (statusF === 'done') {
        if (t.status !== 'done') return false;
      }

      return true;
    });

    renderTable(filteredTasks);
  }

  /* ── Priority pill ─────────────────────────────────────────────── */
  function priorityPill(p) {
    const map = { critical: 'neg', high: 'warn', normal: 'accent', low: 'dark' };
    const cls = map[p] || 'dark';
    return `<span class="bcn-pill bcn-pill--${cls}">${escHtml(p || '—')}</span>`;
  }

  /* ── Render table ──────────────────────────────────────────────── */
  function renderTable(rows) {
    const tbody = document.getElementById('tasksTbody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="tm-empty">No tasks match your filters.</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(t => {
      const dc     = dueCss(t.due_date, t.status);
      const rowCls = dc ? `tm-row--${dc}` : '';
      const dueCls = dc ? `tm-due--${dc}` : '';
      const lName  = launchName(t.launch_id);
      const aName  = t.assigned_to_name || (t.assigned_to_user_id ? profileName(t.assigned_to_user_id) : '—');

      const statusSel = `<select class="tm-status-sel" data-id="${escHtml(t.id)}" aria-label="Status">
        <option value="open"${t.status === 'open' ? ' selected' : ''}>Open</option>
        <option value="in-progress"${t.status === 'in-progress' ? ' selected' : ''}>In Progress</option>
        <option value="done"${t.status === 'done' ? ' selected' : ''}>Done</option>
      </select>`;

      return `<tr class="${rowCls}" data-task-id="${escHtml(t.id)}">
        <td style="max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escHtml(t.task_title || '')}">${escHtml(t.task_title || '')}</td>
        <td>${escHtml(lName)}</td>
        <td>${escHtml(aName)}</td>
        <td>${priorityPill(t.priority)}</td>
        <td>${escHtml(t.task_type || '—')}</td>
        <td class="bcn-mono ${dueCls}" style="white-space:nowrap;">${fmtDate(t.due_date)}</td>
        <td>${statusSel}</td>
        <td><button class="tm-btn-edit" data-edit-task="${escHtml(t.id)}">Edit</button></td>
      </tr>`;
    }).join('');
  }

  /* ── Inline status update ──────────────────────────────────────── */
  async function updateStatus(id, value) {
    const extra = {};
    if (value === 'done') {
      extra.completed_at = new Date().toISOString();
      extra.completed_by = currentEmail;
    } else {
      extra.completed_at = null;
      extra.completed_by = null;
    }

    const { error } = await db
      .from('launch_tasks')
      .update({ status: value, ...extra })
      .eq('id', id);

    if (error) {
      setStatus('Status update failed: ' + error.message, 'neg', 4000);
      // revert select visually
      applyFilters();
      return;
    }

    // update local state
    const task = allTasks.find(t => t.id === id);
    if (task) { task.status = value; Object.assign(task, extra); }

    renderKpis();
    applyFilters();
  }

  /* ── Drawer ────────────────────────────────────────────────────── */
  function openDrawer(task) {
    const isNew = !task;
    document.getElementById('drawerTitle').textContent  = isNew ? 'New Task' : (task.task_title || 'Edit Task');
    document.getElementById('dTaskId').value            = isNew ? '' : task.id;
    document.getElementById('dTitle').value             = isNew ? '' : (task.task_title || '');
    document.getElementById('dLaunch').value            = isNew ? '' : (task.launch_id || '');
    document.getElementById('dType').value              = isNew ? '' : (task.task_type || '');
    document.getElementById('dDueDate').value           = isNew ? '' : (task.due_date || '');
    document.getElementById('dNotes').value             = isNew ? '' : (task.notes || '');
    document.getElementById('dPriority').value          = isNew ? 'normal' : (task.priority || 'normal');
    document.getElementById('dAssignee').value          = isNew ? '' : (task.assigned_to_user_id || '');

    const statusRow = document.getElementById('dStatusRow');
    const btnDelete = document.getElementById('btnDelete');
    if (isNew) {
      statusRow.style.display = 'none';
      btnDelete.style.display = 'none';
    } else {
      statusRow.style.display = '';
      document.getElementById('dStatus').value = task.status || 'open';
      btnDelete.style.display = '';
    }

    document.getElementById('tmOverlay').classList.add('open');
    document.getElementById('tmDrawer').classList.add('open');
    setTimeout(() => document.getElementById('dTitle').focus(), 50);
  }

  function closeDrawer() {
    document.getElementById('tmOverlay').classList.remove('open');
    document.getElementById('tmDrawer').classList.remove('open');
  }

  async function saveDrawer() {
    const id         = document.getElementById('dTaskId').value;
    const title      = document.getElementById('dTitle').value.trim();
    const launchId   = document.getElementById('dLaunch').value;
    const assigneeId = document.getElementById('dAssignee').value;

    if (!title) {
      setStatus('Task title is required.', 'neg', 3000);
      document.getElementById('dTitle').focus();
      return;
    }
    if (!launchId) {
      setStatus('Please select a launch — tasks must be associated with a launch.', 'neg', 4000);
      document.getElementById('dLaunch').focus();
      return;
    }

    const assigneeProfile = assigneeId ? allProfiles.find(p => p.id === assigneeId) : null;
    const assigneeName    = assigneeProfile ? (assigneeProfile.name || assigneeProfile.email) : null;

    const payload = {
      task_title:          title,
      launch_id:           launchId,
      task_type:           document.getElementById('dType').value.trim() || null,
      due_date:            document.getElementById('dDueDate').value     || null,
      notes:               document.getElementById('dNotes').value.trim()   || null,
      priority:            document.getElementById('dPriority').value    || 'normal',
      assigned_to_user_id: assigneeId || null,
      assigned_to_name:    assigneeName,
    };

    if (id) {
      payload.status = document.getElementById('dStatus').value || 'open';
      const existing = allTasks.find(t => t.id === id);
      if (payload.status === 'done' && (!existing || existing.status !== 'done')) {
        payload.completed_at = new Date().toISOString();
        payload.completed_by = currentEmail;
      } else if (payload.status !== 'done') {
        payload.completed_at = null;
        payload.completed_by = null;
      }
    } else {
      payload.status = 'open';
    }

    const btnSave = document.getElementById('btnSave');
    btnSave.disabled = true;
    btnSave.textContent = 'Saving…';

    let error;
    if (id) {
      ({ error } = await db.from('launch_tasks').update(payload).eq('id', id));
    } else {
      ({ error } = await db.from('launch_tasks').insert(payload));
    }

    btnSave.disabled = false;
    btnSave.textContent = 'Save Task';

    if (error) {
      setStatus('Save failed: ' + error.message, 'neg', 5000);
      return;
    }

    setStatus(id ? 'Task updated.' : 'Task created.', 'pos', 3000);
    closeDrawer();
    await loadAll();
  }

  async function deleteTask() {
    const id = document.getElementById('dTaskId').value;
    if (!id) return;
    const task = allTasks.find(t => t.id === id);
    const name = task ? (task.task_title || 'this task') : 'this task';
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;

    const { error } = await db.from('launch_tasks').delete().eq('id', id);
    if (error) {
      setStatus('Delete failed: ' + error.message, 'neg', 5000);
      return;
    }
    setStatus('Task deleted.', 'pos', 3000);
    closeDrawer();
    await loadAll();
  }

  /* ── Event delegation ──────────────────────────────────────────── */
  document.getElementById('tasksTbody').addEventListener('change', e => {
    const sel = e.target.closest('.tm-status-sel');
    if (sel) updateStatus(sel.dataset.id, sel.value);
  });

  document.getElementById('tasksTbody').addEventListener('click', e => {
    const btn = e.target.closest('[data-edit-task]');
    if (!btn) return;
    const task = allTasks.find(t => t.id === btn.dataset.editTask);
    if (task) openDrawer(task);
  });

  ['fSearch', 'fLaunch', 'fAssignee', 'fPriority', 'fStatus', 'fType'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input',  applyFilters);
    el.addEventListener('change', applyFilters);
  });

  document.getElementById('btnNew').addEventListener('click', () => openDrawer(null));
  document.getElementById('btnDrawerClose').addEventListener('click', closeDrawer);
  document.getElementById('btnCancel').addEventListener('click', closeDrawer);
  document.getElementById('tmOverlay').addEventListener('click', closeDrawer);
  document.getElementById('btnSave').addEventListener('click', saveDrawer);
  document.getElementById('btnDelete').addEventListener('click', deleteTask);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDrawer();
  });

  /* ── Bootstrap ─────────────────────────────────────────────────── */
  await loadAll();

  /* ── Mount chrome ──────────────────────────────────────────────── */
  if (window.SiloChrome) {
    window.SiloChrome.mount({
      appEl: '#silo-app',
      active: 'planning/tasks',
      user: { email: currentEmail, role: currentRole },
      crumbs: ['Planning', 'Task Manager'],
      supabaseClient: db,
    });
  }

})();
</script>
</body>
</html>
